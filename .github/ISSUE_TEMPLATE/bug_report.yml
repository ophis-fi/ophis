name: Bug report
description: Report a bug in Ophis (frontend, backend, contracts, SDK, or infra)
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **For security vulnerabilities (anything that could affect user funds, solver budget, or partner-fee accrual), do NOT use this form.** See [SECURITY.md](../../SECURITY.md) for the responsible disclosure channel.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the stack does this affect?
      options:
        - Frontend (apps/frontend, ophis.fi)
        - Backend (apps/backend, Rust services)
        - Contracts (Solidity, deployed addresses)
        - SDK (@ophis/sdk)
        - Rebate indexer / partner-fee API
        - Intent API (functions/api/intent)
        - Docs (docs.ophis.fi)
        - Infra (docker, deploy scripts)
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: chain
    attributes:
      label: Chain (if applicable)
      options:
        - Optimism (10) — live
        - HyperEVM (999) — contracts deployed, stack paused
        - MegaETH (4326) — contracts deployed, stack paused
        - Not chain-specific
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: One-paragraph description of the actual behavior.
      placeholder: When I submit a limit order on Optimism with USDC → WETH, the partner-fee receipt …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: One-paragraph description of the expected behavior.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: |
        Step-by-step. If on-chain, include a transaction hash on a testnet (Sepolia / OP Sepolia) — never against mainnet for PoCs.
      placeholder: |
        1. Go to ophis.fi/swap
        2. Select USDC → WETH on OP
        3. …
      render: markdown
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Git SHA / version
      description: Output of `git rev-parse HEAD` (for source builds) or the build commit shown at the bottom of ophis.fi.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser + OS for FE bugs; Rust toolchain + OS for backend; Foundry + RPC for contracts. Skip if obvious.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant console output, network requests, or screenshots. Strip any private keys, API tokens, or wallet addresses you don't want public.
    validations:
      required: false
