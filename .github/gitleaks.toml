# gitleaks config for the `gitleaks` job in .github/workflows/security.yml.
#
# Scope is deliberately narrow: it defines ONLY a raw-EVM-private-key rule.
# GitHub secret scanning + push protection (verified enabled on this repo)
# already cover the provider patterns (AWS, GitHub, npm, Stripe, ...). A raw
# EVM key is 0x + 64 hex and is NOT a provider pattern, so it is the one class
# GitHub's scanners handle only best-effort -- e.g. the OPHIS_DRIVER_SUBMITTER_KEY
# that moves real funds. This file closes exactly that gap and nothing else, so
# it does not import gitleaks' default ruleset (no provider false positives).
#
# FALSE-POSITIVE CONTROL: this repo is full of bare bytes32 (tx/block hashes,
# event topic0, bytes32 constants, CREATE2 init-code hashes). The rule below is
# CONTEXTUAL -- it fires only when a key/secret/priv-style keyword sits within
# ~40 chars BEFORE the 0x + 64-hex value, which bare bytes32 literals never
# have. The allowlists then drop the well-known Anvil/Hardhat test keys (by
# value), generated/vendored artifact paths, and any line that self-identifies
# as a topic0 / init-code-hash / domain-separator / salt.

title = "Ophis gitleaks config (raw EVM private key)"

[[rules]]
id = "evm-private-key"
description = "Raw EVM private key (0x + 64 hex) next to a key/secret/priv keyword"
# RE2 (Go) syntax. Capture group 1 is the key, so gitleaks reports/allowlists
# on the 0x...64 value. Requires a contextual keyword prefix to skip bare bytes32.
regex = '''(?i)(?:priv(?:ate)?[_-]?key|secret[_-]?key|secret|mnemonic|signer[_-]?key|submitter[_-]?key)['"\s:=]{0,40}(0x[0-9a-fA-F]{64})'''
keywords = [
  "key",
  "secret",
  "priv",
  "mnemonic",
]

  # Well-known Anvil / Hardhat / Foundry default keys (mnemonic
  # "test test test test test test test test test test test junk").
  # Published fixtures, never real funds. Matched against the captured key value.
  [rules.allowlist]
  description = "Standard local-devnet test private keys (public fixtures)"
  regexes = [
    '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
    '''0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d''',
    '''0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a''',
    '''0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6''',
    '''0x47e179ec197488593b187f80a00eb0da91f1b9d0b13f8733639f19c30a34926a''',
    '''0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba''',
    '''0x92db14e403b83dfe3df233f83dfa3a0d7096f21ca9b0d6d6b8d88b2b4ec1564e''',
    '''0x4bbbf85ce3377467afe5d46f804f221813b2bb87f24d81f60f1fcdbf7cbf4356''',
    '''0xdbda1821b80551c9d65939329250298aa3472ba22feea921c0cf5d620ea67b97''',
    '''0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6''',
    '''0xf214f2b2cd398c806f84e317254e0f0b801d0643303237d97a22a48e01628897''',
    '''0x701b615bbdfb9de65240bc28bd21bbc0d996645a3dd57e7b12bc2bdf6f192c82''',
    '''0xa267530f49f8280200edf313ee7af6b827f2a8bce2897751d06a843f644967b1''',
    '''0x47c99abed3324a2707c28affff1267e45918ec8c3f20b8aa892e8b065d2942dd''',
    '''0xc526ee95bf44d8fc405a158bb884d9d1238d99f0612e9f33d006bb0789009aaa''',
    '''0x8166f546bab6da521a8369cab06c5d2b9e46670292d85c875ee9ec20e84ffb61''',
    '''0xea6c44ac03bff858b476bba40716402b03e41b8e97e276d1baec7c37d42484a0''',
    '''0x689af8efa8c651a91ad287602527f3af2fe9f6501a7ac4b061667b5a93e037fd''',
    '''0xde9be858da4a475276426320d5e9262ecfc3ba460bfac56360bfa6c4c28b4ee0''',
    '''0xdf57089febbacf7ba0bc227dafbffa9fc08a93fdc68e1e42411a14efcf23656e''',
  ]

# Global allowlist: paths where bytes32 literals are pervasive and never
# secrets, plus lines that self-identify as non-secret bytes32.
[allowlist]
description = "Generated/vendored artifacts and self-labeled non-secret bytes32"
paths = [
  '''(^|/)contracts/(out|artifacts|cache|broadcast)/''',
  '''(^|/)artifacts/''',
  '''(^|/)typechain(-types)?/''',
  '''(^|/)bindings/''',
  '''\.abi\.json$''',
  '''(^|/)deployments?/.*\.json$''',
  '''pnpm-lock\.yaml$''',
  '''yarn\.lock$''',
  '''(^|/)\.github/gitleaks\.toml$''',
  # Example / documentation / test files that carry placeholder keys by design
  # (dummy zeros, sequential hex, or the anvil fixtures). A real operational
  # key would live in a rendered config or env, not a committed example/doc/test
  # (and those surfaces are still scanned). Anchored with (^|/) so both the
  # current and pre-restructure historical paths match under full-history scans.
  '''(^|/)example\.toml$''',
  '''(^|/)[^/]*\.example($|\.)''',
  '''(^|/)cypress/''',
  '''(^|/)docs/development/plans/''',
  '''(^|/)README\.md$''',
]
regexTarget = "line"
regexes = [
  '''(?i)(topic0|init[_-]?code[_-]?hash|POOL_INIT_CODE_HASH|domain[_-]?separator|\bsalt\b)''',
]
