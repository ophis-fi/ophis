name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: build + deploy
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-pages-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            apps/frontend/pnpm-lock.yaml

      - name: install cowswap deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: build cowswap
        working-directory: apps/frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm run build:cowswap

      - name: install wrangler globally
        run: npm install -g wrangler@latest

      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/frontend/build/cowswap --project-name=greg --branch=main --commit-dirty=true
