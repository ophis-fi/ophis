name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write
  id-token: write # SLSA build provenance (#438)
  attestations: write # SLSA build provenance (#438)

jobs:
  deploy:
    name: build + deploy
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-pages-${{ github.ref }}
      # cancel-in-progress: false — this job runs two sequential, non-atomic
      # `wrangler pages deploy` calls (cowswap -> project `greg`, explorer ->
      # project `ophis-explorer`). Cancelling mid-run can leave one Pages
      # project on the new version and the other on the old, i.e. a
      # mixed-version production. Let an in-flight deploy finish; a newer push
      # queues behind it and supersedes it cleanly. (audit-low #217; mirrors
      # rebate-indexer-deploy.yml.)
      cancel-in-progress: false
    steps:
      # No fetch-depth: 0 — pages deploy doesn't need full history. Audit
      # finding 2026-05-09: shrinking the working tree shrinks the
      # surface for any pre-build hook that touches git history.
      #
      # All actions pinned to commit SHAs (audit finding M3, 2026-05-09).
      # Tag refs are mutable; SHAs are immutable. Bump via dependabot or
      # by re-running the audit script.
      #
      # Bumped 2026-05-11 to Node-24-compatible majors ahead of GitHub
      # Actions' Node 20 deprecation (forced default 2026-06-02).
      # cloudflare/wrangler-action moved to v4.0.0 (node24) on 2026-05-25,
      # once Cloudflare shipped its Node-24 release (v4.0.0, 2026-05-12).
      # v4 also defaults the bundled Wrangler CLI to v4; the `pages deploy`
      # flags used below are unchanged across Wrangler CLI v3 -> v4.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            apps/frontend/pnpm-lock.yaml

      - name: install cowswap deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      # Deploy the Formspree form config (formspree.json at repo root) so the
      # /contact form is managed as code. Uses the deploy key from a repo secret
      # (NEVER in client code). Skips cleanly if unset and never blocks the
      # frontend deploy (continue-on-error).
      # Note: Cloudflare Turnstile CANNOT be configured via formspree.json —
      # the Formspree CLI's schema only accepts `captcha.type: "recaptcha"`,
      # not "turnstile" (confirmed by the API itself: 2026-05-28 run 26564209293
      # rejected `"turnstile"` with `'recaptcha' was expected`). The Turnstile
      # SECRET must be set in the Formspree dashboard UI for the form — paired
      # with the public REACT_APP_TURNSTILE_SITE_KEY built into the bundle.
      - name: deploy Formspree forms
        continue-on-error: true
        env:
          FORMSPREE_DEPLOY_KEY: ${{ secrets.FORMSPREE_DEPLOY_KEY }}
        run: |
          if [ -n "$FORMSPREE_DEPLOY_KEY" ]; then
            npx --yes @formspree/cli@latest deploy -k "$FORMSPREE_DEPLOY_KEY"
          else
            echo "FORMSPREE_DEPLOY_KEY not set; skipping Formspree form deploy."
          fi

      - name: build cowswap
        working-directory: apps/frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Tags every order produced by this build with appCode "ophis"
          # (instead of cowswap's upstream default "CoW Swap"). Tracked
          # in apps/frontend/.ophis-divergences.md.
          REACT_APP_APP_CODE: ophis
          # Base URL for the rebate-indexer API (TierChip + useTier hook).
          # Defaults to the same value at runtime if the env var is missing.
          REACT_APP_REBATES_API: https://rebates.ophis.fi
          # Flat volume fee in bps (build-time flag, validated [1,50] client-side).
          # Empty/unset -> 0 -> fee OFF (current price-improvement model). Set to
          # 10 to activate the flat 0.10% fee. Move in lockstep with the @ophis/sdk
          # republish + the static fee copy (docs/business/llms/tier all say 10 bps).
          REACT_APP_OPHIS_VOLUME_FEE_BPS: ${{ secrets.REACT_APP_OPHIS_VOLUME_FEE_BPS }}
          # Ophis fork: OP mainnet (chain 10) RPC URL. The default public
          # node fallback works but a private endpoint is preferred for
          # production. Add REACT_APP_NETWORK_URL_10 to GitHub repo secrets
          # to override.
          REACT_APP_NETWORK_URL_10: ${{ secrets.REACT_APP_NETWORK_URL_10 }}
          # Ophis fork: ensure the production build is detected as the
          # production environment by lib/common-utils/environments.ts.
          # Without this, production runs as "local" env and defaults to
          # staging endpoints.
          REACT_APP_DOMAIN_REGEX_PRODUCTION: ^(ophis\.fi|.*\.ophis\.fi|greg-etm\.pages\.dev)$
          # Ophis Bungee affiliate ID (public attribution, bridge rev-share to
          # the Ophis Safe). The dedicated API key (BUNGEE_API) is intentionally
          # NOT built into the bundle (Bungee requires it server-side); it is a
          # Cloudflare Pages RUNTIME secret read by functions/api/bungee.
          REACT_APP_BUNGEE_AFFILIATE_ID: ${{ secrets.REACT_APP_BUNGEE_AFFILIATE_ID }}
          # Build flag (default OFF/empty) to route Bungee through the dedicated
          # proxy. Set to 'true' only after BUNGEE_API is a CF Pages runtime
          # secret + the dedicated host/feeBps are confirmed. Empty -> OFF.
          REACT_APP_BUNGEE_DEDICATED_ENABLED: ${{ secrets.REACT_APP_BUNGEE_DEDICATED_ENABLED }}
          # Cloudflare Turnstile site key for the /contact form widget. PUBLIC
          # value (rendered to the browser as a `sitekey` attr) — safe to
          # inline in the bundle. The matching SECRET is NOT a CI secret: it
          # lives in the Formspree dashboard (per-form CAPTCHA setting) because
          # formspree.json's schema is recaptcha-only (see the pinned-contract
          # comment above the `deploy Formspree forms` step). If this site key
          # is unset, Contact.container.tsx skips the widget and the form
          # falls back to honeypot + Formspree ML.
          REACT_APP_TURNSTILE_SITE_KEY: ${{ secrets.REACT_APP_TURNSTILE_SITE_KEY }}
        run: pnpm run build:cowswap

      - name: drop production source maps
        # Cowswap's vite.config.mts ships sourcemap:true; the resulting
        # index-*.js.map files weigh ~25-26 MB and trip Cloudflare Pages'
        # 25 MiB per-file limit. Source maps add nothing for the public
        # production deploy. Future option if local debugging needs them:
        # set `sourcemap: process.env.NODE_ENV !== 'production'` in
        # apps/cowswap-frontend/vite.config.mts (would be a tracked
        # divergence on subtree pulls — see apps/frontend/.ophis-divergences.md).
        run: |
          find apps/frontend/build/cowswap -name '*.js.map' -type f -delete
          echo "remaining map files (none expected):"
          find apps/frontend/build/cowswap -name '*.map' -type f | head

      - name: stage Pages Functions into build output
        # CF Pages picks up `functions/` adjacent to the deployed root.
        # Source lives at repo root (`functions/`) so it's editable
        # alongside the frontend; copied into the deploy dir before push.
        run: |
          if [ -d functions ]; then
            mkdir -p apps/frontend/build/cowswap/functions
            cp -R functions/. apps/frontend/build/cowswap/functions/
            echo "staged functions:"
            find apps/frontend/build/cowswap/functions -type f
          fi

      # `cloudflare/wrangler-action` installs its own wrangler. The prior
      # `npm install -g wrangler@latest` step was redundant AND a floating
      # tag against npm — audit finding M2 (2026-05-09). Removed.

      # Sanitize the commit message before handing it to wrangler.
      #
      # The Cloudflare Pages deployments API rejects messages with
      # non-ASCII bytes (em-dash, arrow, degree, smart quotes, etc.)
      # with error 8000111 "Invalid commit message, it must be a valid
      # UTF-8 string." That wording is misleading: the message IS valid
      # UTF-8; CF's parser is just ASCII-only. By default wrangler
      # reads HEAD's message from git and forwards it, so any author
      # who uses an em-dash breaks the deploy.
      #
      # We reduce the message to a safe ASCII subset (alphanumeric +
      # narrow shell-neutral punctuation allowlist), so:
      #   (a) CF's parser accepts it
      #   (b) it cannot break out of the --commit-message="..." arg
      #       when shell-quote parses the wrangler command
      #   (c) untrusted commit-author input never reaches a shell as
      #       executable text — RAW message lives only in a python
      #       process env var, output goes to GITHUB_OUTPUT.
      #
      # Incident: 2026-05-23 deploy of f088135d6 (PR #272), wrangler
      # 3.90.0. Em-dash + arrow + degree chars in commit body.
      - name: sanitize commit message for CF Pages API
        id: cf_msg
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, re, sys
          raw = os.environ.get('RAW_COMMIT_MSG', '') or ''
          # Collapse anything outside [A-Za-z0-9] + a narrow safe-punct
          # allowlist to single spaces. The allowlist excludes `"`, `$`,
          # backtick, backslash, semicolon — so the result is shell-safe
          # under wrangler-action's shell-quote arg parsing.
          safe = re.sub(r'[^A-Za-z0-9 .,\-_:/()\[\]#+@=!?]', ' ', raw)
          safe = re.sub(r'\s+', ' ', safe).strip()
          if not safe:
              safe = os.environ.get('GITHUB_SHA', 'deploy')
          safe = safe[:1000]
          sys.stdout.write('msg<<EOF_CF_MSG\n')
          sys.stdout.write(safe + '\n')
          sys.stdout.write('EOF_CF_MSG\n')
          PY

      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          # commit-message + commit-hash are passed explicitly so
          # wrangler does not auto-read git HEAD (which would re-
          # introduce non-ASCII bytes). The msg value comes from the
          # python sanitizer above: only chars in the safe allowlist,
          # so it cannot escape the --commit-message="..." quotes.
          command: pages deploy apps/frontend/build/cowswap --project-name=greg --branch=main --commit-dirty=true --commit-message="${{ steps.cf_msg.outputs.msg }}" --commit-hash=${{ github.sha }}

      # ── Explorer (separate Pages project, separate hostname) ──────────
      # Build with our self-hosted orderbook base URLs so the explorer
      # reads from {optimism,megaeth,hyperevm}-mainnet.ophis.fi instead
      # of the canonical CoW endpoints (which don't index our forks'
      # orders). Deployed at https://explorer.ophis.fi via CF Pages
      # project `ophis-explorer` (custom domain wired manually 2026-05-16).
      - name: build explorer
        working-directory: apps/frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Maps `SupportedChainId → orderbook host` for every chain the
          # explorer should be able to surface orders for. This MUST cover
          # every chain the swap app offers (libs/common-const/src/chainInfo.ts)
          # — the swap UI's order-id deep-link points at explorer.ophis.fi/<net>/
          # orders/<uid>, and any chain missing here makes the orderbook base
          # resolve to the string "undefined" -> /undefined/api/v1/orders/... ->
          # 404 -> a blank Order Details page (caught on Base, 2026-06-04).
          # The Ophis-fork chains (10, 4326, 999) point at our self-hosted CoW
          # services; the canonical CoW chains stay on api.cow.fi (we don't run
          # our own orderbook there). All api.cow.fi slugs verified live.
          REACT_APP_ORDER_BOOK_URLS: '{"1":"https://api.cow.fi/mainnet","100":"https://api.cow.fi/xdai","42161":"https://api.cow.fi/arbitrum_one","8453":"https://api.cow.fi/base","137":"https://api.cow.fi/polygon","43114":"https://api.cow.fi/avalanche","56":"https://api.cow.fi/bnb","59144":"https://api.cow.fi/linea","57073":"https://api.cow.fi/ink","9745":"https://api.cow.fi/plasma","11155111":"https://api.cow.fi/sepolia","10":"https://optimism-mainnet.ophis.fi","4326":"https://megaeth-mainnet.ophis.fi","999":"https://hyperevm.ophis.fi"}'
        run: pnpx nx run explorer:build --skip-nx-cache

      - name: deploy explorer to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          # Reuses the sanitized message from the cowswap deploy step
          # above (same workflow run, same HEAD commit). See the
          # `sanitize commit message for CF Pages API` step for why.
          command: pages deploy apps/frontend/build/explorer --project-name=ophis-explorer --branch=main --commit-dirty=true --commit-message="${{ steps.cf_msg.outputs.msg }}" --commit-hash=${{ github.sha }}

      # Supply-chain provenance (#438). Runs AFTER both deploys so it can never
      # block a release. Hashes exactly the bytes pushed to CF Pages (swap +
      # explorer) into one manifest, then attests it via SLSA build-provenance.
      - name: generate bundle manifest
        id: manifest
        run: |
          MANIFEST="${{ runner.temp }}/cf-bundle-manifest.txt"
          # Exclude functions/ — CF compiles Pages Functions server-side, so the
          # deployed worker bytes are NOT these source files; attest only the
          # static assets we ship byte-for-byte.
          ( cd apps/frontend/build/cowswap && find . -type f -not -path './functions/*' -exec sha256sum {} \; | LC_ALL=C sort | sed 's# \./# swap/#' ) > "$MANIFEST"
          ( cd apps/frontend/build/explorer && find . -type f -exec sha256sum {} \; | LC_ALL=C sort | sed 's# \./# explorer/#' ) >> "$MANIFEST"
          echo "path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "manifest covers $(wc -l < "$MANIFEST") files"
      # subject-checksums (not subject-path): attests EACH listed file's digest
      # as its own subject, so `gh attestation verify <deployed-file>` works
      # without anyone needing the manifest. The manifest is a sha256sum file.
      - name: attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: ${{ steps.manifest.outputs.path }}
