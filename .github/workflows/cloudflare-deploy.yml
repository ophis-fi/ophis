name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: build + deploy
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-pages-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # No fetch-depth: 0 — pages deploy doesn't need full history. Audit
      # finding 2026-05-09: shrinking the working tree shrinks the
      # surface for any pre-build hook that touches git history.
      #
      # All actions pinned to commit SHAs (audit finding M3, 2026-05-09).
      # Tag refs are mutable; SHAs are immutable. Bump via dependabot or
      # by re-running the audit script.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            apps/frontend/pnpm-lock.yaml

      - name: install cowswap deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: build cowswap
        working-directory: apps/frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Tags every order produced by this build with appCode "greg"
          # (instead of cowswap's upstream default "CoW Swap"). Tracked
          # in apps/frontend/.greg-divergences.md. UPDATE THIS WHEN BRAND
          # WORK LANDS A REAL PROJECT NAME.
          REACT_APP_APP_CODE: greg
        run: pnpm run build:cowswap

      - name: drop production source maps
        # Cowswap's vite.config.mts ships sourcemap:true; the resulting
        # index-*.js.map files weigh ~25-26 MB and trip Cloudflare Pages'
        # 25 MiB per-file limit. Source maps add nothing for the public
        # production deploy. Future option if local debugging needs them:
        # set `sourcemap: process.env.NODE_ENV !== 'production'` in
        # apps/cowswap-frontend/vite.config.mts (would be a tracked
        # divergence on subtree pulls — see apps/frontend/.greg-divergences.md).
        run: |
          find apps/frontend/build/cowswap -name '*.js.map' -type f -delete
          echo "remaining map files (none expected):"
          find apps/frontend/build/cowswap -name '*.map' -type f | head

      - name: stage Pages Functions into build output
        # CF Pages picks up `functions/` adjacent to the deployed root.
        # Source lives at repo root (`functions/`) so it's editable
        # alongside the frontend; copied into the deploy dir before push.
        run: |
          if [ -d functions ]; then
            mkdir -p apps/frontend/build/cowswap/functions
            cp -R functions/. apps/frontend/build/cowswap/functions/
            echo "staged functions:"
            find apps/frontend/build/cowswap/functions -type f
          fi

      # `cloudflare/wrangler-action` installs its own wrangler. The prior
      # `npm install -g wrangler@latest` step was redundant AND a floating
      # tag against npm — audit finding M2 (2026-05-09). Removed.
      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/frontend/build/cowswap --project-name=greg --branch=main --commit-dirty=true
