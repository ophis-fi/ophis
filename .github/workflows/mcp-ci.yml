name: CI @ophis/mcp-server

# Build + typecheck + unit-test gate for the MCP server.
#
# Deploy is intentionally NOT automated here: it targets Cloudflare WORKERS
# (not Pages), which needs a token with Workers Scripts/Routes:Edit. The repo's
# CLOUDFLARE_API_TOKEN secret is Pages/DNS-scoped and cannot deploy Workers.
# Until a Workers-scoped token is added as a secret, deploy manually with a
# Workers-capable session:  cd apps/mcp-server && wrangler deploy
# (wrangler's OAuth login has workers_scripts + workers_routes + ssl_certs.)

on:
  push:
    branches: [main]
    paths:
      - 'apps/mcp-server/**'
      - 'packages/sdk/**'
      - '.github/workflows/mcp-ci.yml'
  pull_request:
    paths:
      - 'apps/mcp-server/**'
      - 'packages/sdk/**'

permissions:
  contents: read

concurrency:
  group: mcp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + typecheck + test
    runs-on: ubuntu-latest
    steps:
      # Action SHAs pinned (mirrors ci.yml). Tag refs are mutable; SHAs are not.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The MCP Worker imports @ophis/sdk from its built dist/.
      - run: pnpm --filter @ophis/sdk build

      - run: pnpm --filter @ophis/mcp-server typecheck
      - run: pnpm --filter @ophis/mcp-server test

      # Validate the Worker bundles + config without deploying (no token needed).
      - run: pnpm --filter @ophis/mcp-server dry-run
