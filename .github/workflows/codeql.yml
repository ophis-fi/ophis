name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC. Doesn't gate PRs; surfaces new advisories.
    - cron: '0 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Backend: Rust crates (CodeQL has no native Rust; we lean on
        # `cargo audit` + `cargo deny` (already wired in security.yml)
        # and Slither for Solidity. CodeQL covers our JS/TS surface:
        #   - functions/api/*  (Cloudflare Pages Functions)
        #   - apps/frontend/   (cowswap-frontend + cow-fi)
        #   - apps/rebate-indexer/
        #   - packages/sdk/
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Default queries + security-extended (slower but catches more)
          queries: security-extended,security-and-quality
          # Exclude vendored upstream code from CodeQL noise: the
          # `apps/backend/` git subtree is cowprotocol/services and has
          # its own CI; the contracts/ git subtree is cowprotocol/contracts.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
