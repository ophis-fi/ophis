name: rebate-indexer CI

on:
  # Nightly schedule disabled until the Sepolia test Safe (D5 from PR #8)
  # is deployed and E2E_SAFE_ADDRESS + E2E_SAFE_BURNER_KEY + SEPOLIA_RPC_URL
  # secrets are set. Re-enable by uncommenting the schedule block below once
  # those are in place. Operator runbook: infra/cloudflare/ophis-chain-backends.md
  # § "Deferred operator task: re-enable rebate-indexer nightly e2e".
  # schedule:
  #   - cron: '0 3 * * *'                                  # 03:00 UTC daily — runs after deploy and prod cron
  pull_request:
    paths:
      - "apps/rebate-indexer/**"
      - "packages/sdk/**"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/rebate-indexer-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/rebate-indexer/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @ophis/rebate-indexer...
      - run: pnpm --filter @ophis/rebate-indexer typecheck
      - run: pnpm --filter @ophis/rebate-indexer test
      - run: pnpm --filter @ophis/rebate-indexer test:integration
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @ophis/rebate-indexer...
      - run: pnpm --filter @ophis/rebate-indexer test:e2e
        env:
          RUN_E2E: '1'
          E2E_SAFE_ADDRESS: ${{ vars.E2E_SAFE_ADDRESS }}
          E2E_SAFE_BURNER_KEY: ${{ secrets.E2E_SAFE_BURNER_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
