name: Deploy @ophis/safe-app to Cloudflare Pages

# The Ophis Safe{Wallet} App (safe.ophis.fi) ships to its OWN Cloudflare Pages project
# (`ophis-safe-app`), separate from the main app's `greg` project and the
# `ophis-landing`/`ophis-docs` projects. A separate workflow means a Safe-App build failure never
# reddens — or blocks — the main app deploy, and the Safe App only rebuilds when it (or the SDK it
# bundles) changes.
#
# WHY this mirrors ci.yml's `safe-app` job and NOT landing-deploy.yml: apps/safe-app lives in the
# ROOT pnpm workspace (pnpm-workspace.yaml) and depends on @ophis/sdk via `workspace:*`, so install
# happens at the repo root (cache key pnpm-lock.yaml) and the SDK is built FIRST — the Safe App
# typechecks against the SDK's emitted .d.ts. (landing/swap instead install inside the
# self-contained apps/frontend tree.) The build script is `tsc -b && vite build`, so the build step
# also typechecks; the dedicated CI `safe-app` job is the standalone typecheck gate.
#
# ONE-TIME OPERATOR SETUP (the deploy step fails until this is done):
#   1. Create the Pages project (production branch MUST be `main` so the workflow's `--branch=main`
#      push is treated as production):
#        pnpm dlx wrangler pages project create ophis-safe-app --production-branch main
#      (or: Cloudflare dashboard -> Workers & Pages -> Create -> Pages -> Direct Upload, name it
#       `ophis-safe-app`, production branch `main`.)
#   2. Bind the custom domain `safe.ophis.fi` to the `ophis-safe-app` project (CF dashboard -> the
#      project -> Custom domains -> Set up a custom domain -> safe.ophis.fi). ophis.fi's DNS is on
#      Cloudflare, so CF auto-creates the proxied CNAME; no manual DNS record needed. This is a
#      fresh subdomain (not served by `greg`), so there is nothing to detach.
# See apps/safe-app/README.md for the post-deploy Safe Apps registry submission.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/safe-app/**'
      # @ophis/safe-app bundles @ophis/sdk (workspace:*). An SDK change must redeploy the Safe App
      # too, or safe.ophis.fi silently ships a stale SDK.
      - 'packages/sdk/**'
      - '.github/workflows/safe-app-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write
  id-token: write # SLSA build provenance (#438)
  attestations: write # SLSA build provenance (#438)

concurrency:
  group: cloudflare-pages-safe-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build + deploy safe-app
    runs-on: ubuntu-latest
    steps:
      # All actions pinned to commit SHAs (audit finding M3) — kept in lockstep with the sibling
      # cloudflare-deploy.yml / landing-deploy.yml / docs-deploy.yml.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build SDK (Safe App typechecks + bundles against its emitted .d.ts)
        run: pnpm --filter @ophis/sdk build

      - name: build safe-app
        # tsc -b && vite build -> apps/safe-app/dist. public/{_headers,manifest.json,ophis-icon.svg}
        # are copied verbatim to dist/ root (Vite default publicDir), so safe.ophis.fi/manifest.json
        # is served with the CORS header Safe needs to register the app. tsc -b also gates type errors.
        env:
          # Build-time, both OPTIONAL (graceful fallback per apps/safe-app/.env.example). For Ophis's
          # OWN deploy the referral code is normally empty (no external integrator to credit; the
          # Ophis partner fee is collected via appData regardless). The rebate API falls back to
          # https://rebates.ophis.fi when unset.
          VITE_OPHIS_REFERRAL_CODE: ${{ secrets.VITE_OPHIS_REFERRAL_CODE }}
          VITE_OPHIS_REBATE_API: ${{ secrets.VITE_OPHIS_REBATE_API }}
        run: pnpm --filter @ophis/safe-app build

      - name: sanitize commit message for CF Pages
        id: msg
        env:
          # Isolate untrusted input — never interpolate the commit message directly into a run:
          # shell string (command injection). Mirrors landing-deploy.yml.
          RAW_MSG: ${{ github.event.head_commit.message }}
        run: |
          # CF Pages rejects non-ASCII in commit messages (error 8000111) and multiline corrupts
          # GITHUB_OUTPUT's single-line key=value; strip to printable ASCII only, cap length.
          MSG=$(printf '%s' "$RAW_MSG" | LC_ALL=C tr -cd '\40-\176' | head -c 200)
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - name: wrangler pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Sanitized message via env, not direct expression interpolation in the command string.
          COMMIT_MSG: ${{ steps.msg.outputs.msg }}
        run: |
          # cloudflare/wrangler-action installs wrangler via `pnpm add` which fails with
          # ERR_PNPM_ADDING_TO_ROOT in our pnpm workspace, so call wrangler directly via npx, PINNED
          # exact (mirrors landing-deploy.yml) so this token-bearing step can't pull a compromised
          # future 4.x release. Bump deliberately. apps/safe-app/dist is a leaf (no functions/, no
          # node_modules), so npx-wrangler from the repo root is clean and needs no staging dir.
          npx --yes wrangler@4.100.0 pages deploy apps/safe-app/dist \
            --project-name=ophis-safe-app \
            --branch=main \
            --commit-message="$COMMIT_MSG"

      # Supply-chain provenance (#438). main-only and AFTER the deploy, so it can never block a
      # release. Hashes exactly the bytes pushed to CF Pages, then attests via SLSA build-provenance.
      - name: generate bundle manifest
        id: manifest
        run: |
          MANIFEST="${{ runner.temp }}/safe-app-bundle-manifest.txt"
          ( cd apps/safe-app/dist && find . -type f -exec sha256sum {} \; | LC_ALL=C sort ) > "$MANIFEST"
          echo "path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "manifest covers $(wc -l < "$MANIFEST") files"
      - name: attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: ${{ steps.manifest.outputs.path }}
