name: Deploy @ophis/landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/apps/ophis-landing/**'
      - '.github/workflows/landing-deploy.yml'
  pull_request:
    paths:
      - 'apps/frontend/apps/ophis-landing/**'

permissions:
  contents: read
  deployments: write

concurrency:
  group: landing-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    name: build + lighthouse + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          package_json_file: apps/frontend/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          # cache disabled: pnpm/action-setup handles pnpm caching;
          # setup-node's cache feature conflicts with that and fails post-job
          # with "Path Validation Error: Path(s) specified...do(es) not exist".

      - name: install
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: typecheck
        working-directory: apps/frontend
        run: pnpm --filter @ophis/landing typecheck

      - name: build
        working-directory: apps/frontend
        run: pnpm --filter @ophis/landing build

      - name: playwright install
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec playwright install --with-deps chromium

      - name: playwright tests
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec playwright test

      - name: lighthouse CI (perf budget gate)
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec lhci autorun

      - name: sanitize commit message for CF Pages
        id: msg
        env:
          # Isolate the untrusted input as an env var — never interpolate
          # github.event.head_commit.message directly into the run: shell string
          # (command injection via crafted commit messages). Ref: feedback_cf_pages_ascii_commit_message
          RAW_MSG: ${{ github.event.head_commit.message }}
        run: |
          # CF Pages rejects non-ASCII in commit messages (error 8000111).
          # Strip to printable ASCII only (no tabs/LF/CR) — multiline commit messages
          # corrupt GITHUB_OUTPUT's single-line key=value format. CF Pages also rejects
          # non-ASCII (error 8000111). Ref: feedback_cf_pages_ascii_commit_message.
          MSG=$(printf '%s' "$RAW_MSG" | LC_ALL=C tr -cd '\40-\176' | head -c 200)
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - name: stage intent API function for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          # ophis.fi serves /api/intent as the canonical alias of
          # swap.ophis.fi/api/intent, using the SAME shared, hardened handler
          # (functions/api/intent.ts). Copy ONLY functions/api/ into the deploy
          # bucket — deliberately NOT functions/_middleware.ts — so the landing
          # stays static (only /api/* invokes a Pages Function; every other route
          # is served from cache with no function on the hot path). CF Pages
          # picks up functions/ adjacent to the deployed root.
          if [ -d functions/api ]; then
            mkdir -p apps/frontend/apps/ophis-landing/dist/functions/api
            cp -R functions/api/. apps/frontend/apps/ophis-landing/dist/functions/api/
            echo "staged functions:"
            find apps/frontend/apps/ophis-landing/dist/functions -type f
          fi

      - name: wrangler pages deploy
        if: github.ref == 'refs/heads/main'
        env:
          # Same injection-prevention pattern: sanitized output goes through env, not
          # direct expression interpolation inside the command: string.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MSG: ${{ steps.msg.outputs.msg }}
        run: |
          # cloudflare/wrangler-action installs wrangler via `pnpm add` which
          # fails with ERR_PNPM_ADDING_TO_ROOT in our pnpm workspace. Bypass by
          # calling wrangler directly via npx.
          npx --yes wrangler@4 pages deploy apps/frontend/apps/ophis-landing/dist \
            --project-name=ophis-landing \
            --branch=main \
            --commit-message="$COMMIT_MSG"
