name: Deploy @ophis/landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/apps/ophis-landing/**'
      # ophis.fi/api/intent is served by the SHARED functions/api/ handler,
      # staged into the landing bundle by the "stage intent API function" step
      # below. Without this path, changes to functions/api/** redeploy only
      # swap.ophis.fi (cloudflare-deploy.yml, no path filter) and ophis.fi's
      # endpoint silently falls behind (it lagged 5 hardening PRs before this
      # was added, 2026-05-29). swap.ophis.fi gets the same file via its own
      # workflow; this keeps the two hosts' /api/intent in lockstep.
      - 'functions/api/**'
      - '.github/workflows/landing-deploy.yml'
  pull_request:
    paths:
      - 'apps/frontend/apps/ophis-landing/**'
      - 'functions/api/**'
  # TEMPORARY (remove after 2026-07-14): daily rebuild so the scheduled blog posts
  # (pubDate Jul 9-14, gated by src/lib/posts.ts isPublished) go live on their date.
  # A static build only surfaces a future-dated post when it rebuilds, so we rebuild
  # daily during the launch window. The `window` job below makes scheduled runs a
  # no-op outside Jul 9-14, so this self-expires with no effect on push/PR deploys.
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: read
  deployments: write
  id-token: write # SLSA build provenance (#438)
  attestations: write # SLSA build provenance (#438)

concurrency:
  group: landing-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate for the daily `schedule` rebuild only. push/PR events always proceed
  # (behaviour unchanged); a scheduled run proceeds ONLY within the Jul 9-14 2026
  # blog launch window, so the temporary cron self-expires without a manual edit
  # and never deploys off-window. github.event_name is a fixed enum, not user input.
  window:
    name: publish-window gate
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          T=$(date -u +%Y-%m-%d)
          if [[ "$T" > "2026-07-08" && "$T" < "2026-07-15" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run on $T is outside the Jul 9-14 publish window; skipping."
          fi

  build-deploy:
    needs: window
    if: needs.window.outputs.proceed == 'true'
    name: build + lighthouse + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
        with:
          package_json_file: apps/frontend/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          # cache disabled: pnpm/action-setup handles pnpm caching;
          # setup-node's cache feature conflicts with that and fails post-job
          # with "Path Validation Error: Path(s) specified...do(es) not exist".

      - name: install
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: typecheck
        working-directory: apps/frontend
        run: pnpm --filter @ophis/landing typecheck

      - name: build
        working-directory: apps/frontend
        run: pnpm --filter @ophis/landing build

      - name: playwright install
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec playwright install --with-deps chromium

      - name: playwright tests
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec playwright test

      - name: lighthouse CI (perf budget gate)
        working-directory: apps/frontend/apps/ophis-landing
        run: pnpm exec lhci autorun

      - name: sanitize commit message for CF Pages
        id: msg
        env:
          # Isolate the untrusted input as an env var — never interpolate
          # github.event.head_commit.message directly into the run: shell string
          # (command injection via crafted commit messages). Ref: feedback_cf_pages_ascii_commit_message
          RAW_MSG: ${{ github.event.head_commit.message }}
        run: |
          # CF Pages rejects non-ASCII in commit messages (error 8000111).
          # Strip to printable ASCII only (no tabs/LF/CR) — multiline commit messages
          # corrupt GITHUB_OUTPUT's single-line key=value format. CF Pages also rejects
          # non-ASCII (error 8000111). Ref: feedback_cf_pages_ascii_commit_message.
          MSG=$(printf '%s' "$RAW_MSG" | LC_ALL=C tr -cd '\40-\176' | head -c 200)
          # Scheduled runs have no head_commit, so RAW_MSG is empty -> give CF Pages a label.
          MSG=${MSG:-scheduled rebuild}
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - name: stage intent API function for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          # ophis.fi serves /api/intent as the canonical alias of
          # swap.ophis.fi/api/intent, using the SAME shared, hardened handler
          # (functions/api/intent.ts). Copy ONLY functions/api/ into the deploy
          # bucket — deliberately NOT functions/_middleware.ts — so the landing
          # stays static (only /api/* invokes a Pages Function; every other route
          # is served from cache with no function on the hot path). CF Pages
          # picks up functions/ adjacent to the deployed root.
          if [ -d functions/api ]; then
            mkdir -p apps/frontend/apps/ophis-landing/dist/functions/api
            cp -R functions/api/. apps/frontend/apps/ophis-landing/dist/functions/api/
            echo "staged functions:"
            find apps/frontend/apps/ophis-landing/dist/functions -type f
          fi

      - name: wrangler pages deploy
        if: github.ref == 'refs/heads/main'
        env:
          # Same injection-prevention pattern: sanitized output goes through env, not
          # direct expression interpolation inside the command: string.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MSG: ${{ steps.msg.outputs.msg }}
        run: |
          # cloudflare/wrangler-action installs wrangler via `pnpm add` which
          # fails with ERR_PNPM_ADDING_TO_ROOT in our pnpm workspace. Bypass by
          # calling wrangler directly via npx, PINNED exact (was the wrangler@4
          # floating tag) so this token-bearing step can't pull a compromised
          # future 4.x release. Bump deliberately.
          npx --yes wrangler@4.100.0 pages deploy apps/frontend/apps/ophis-landing/dist \
            --project-name=ophis-landing \
            --branch=main \
            --commit-message="$COMMIT_MSG"

      # Request a fast recrawl from Bing/Yandex/Seznam via IndexNow. Non-fatal
      # (the script always exits 0) and main-only, so it can never block a
      # release. The IndexNow key is public (hosted at /<key>.txt in public/).
      - name: IndexNow ping
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: node scripts/indexnow-ping.mjs ophis.fi https://ophis.fi/

      # Supply-chain provenance (#438). main-only (matches the deploy step) and
      # AFTER it, so it can never block a release. Hashes exactly the deployed
      # bytes into a manifest, then attests it via SLSA build-provenance.
      - name: generate bundle manifest
        id: manifest
        if: github.ref == 'refs/heads/main'
        run: |
          MANIFEST="${{ runner.temp }}/landing-bundle-manifest.txt"
          # Exclude functions/ — the staged /api/intent Pages Function is
          # compiled server-side by CF, so its deployed worker bytes are not
          # these source files; attest only the static assets shipped verbatim.
          ( cd apps/frontend/apps/ophis-landing/dist && find . -type f -not -path './functions/*' -exec sha256sum {} \; | LC_ALL=C sort ) > "$MANIFEST"
          echo "path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "manifest covers $(wc -l < "$MANIFEST") files"
      # subject-checksums attests each listed file's digest, so any deployed
      # file is verifiable with `gh attestation verify <file>` (no manifest needed).
      - name: attest build provenance
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: ${{ steps.manifest.outputs.path }}
