name: Security

# Runs on every PR targeting main / docs/* / feat/* branches plus on
# workflow_dispatch for ad-hoc runs.
#
# Three jobs run in parallel:
#   - slither       — Solidity static analysis (Trail of Bits)
#   - pnpm-audit    — JS/TS dep advisories
#   - cargo-audit   — Rust dep advisories
#
# Each job blocks merge if it regresses against the 2026-05-13 audit baseline.

on:
  pull_request:
    branches:
      - main
      - 'docs/**'
      - 'feat/**'
  workflow_dispatch:

# Default to read-only — fork PRs do not need write access. Audit
# finding 2026-05-09 (matches ci.yml).
permissions:
  contents: read

jobs:
  slither:
    name: Slither (Solidity)
    runs-on: ubuntu-latest
    # Runs Trail of Bits' eth-security-toolbox container (digest-pinned
    # for reproducibility). The container ships slither 0.11.4, foundry,
    # and solc-select with 0.7.6 pre-installed. Earlier pip-only setups
    # (PR #23 rounds 1-7, PR #26) silently failed in CI because slither
    # auto-invokes `forge` for project detection — even in file-list
    # mode — and the runner lacks foundry by default. The container
    # bypasses that.
    #
    # Gating: per-finding fingerprint diff vs audit/slither-baseline.json
    # (see scripts/slither-baseline.py). Net-new fingerprints fail the
    # job; baseline-known findings stay green. Refresh the baseline by
    # running `scripts/slither-baseline.py --generate ...` after audit.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # File-list mode: production CoW Protocol contracts (Settlement,
      # AllowListAuth + transitively-imported mixins/libs) use only
      # relative imports, so solc resolves from file paths alone. Test
      # files (src/contracts/test/*, ./test/*) use OpenZeppelin +
      # forge-std but are not deployed — out of scope.
      - name: Run Slither (production contracts)
        run: |
          # World-writable so the container's internal user can write
          # JSON output into the bind mount. The Trail of Bits image
          # ships solc-select / slither under a specific user; overriding
          # --user $(id -u) (the first thing we tried) puts the container
          # in a PATH where those binaries aren't installed (slither and
          # solc-select both `command not found`). chmod 0777 lets the
          # image's own user write through the bind without changing the
          # PATH context.
          mkdir -p /tmp/slither-out
          chmod 0777 /tmp/slither-out
          docker run --rm \
            -v "${{ github.workspace }}/contracts/src/contracts:/work" \
            -v /tmp/slither-out:/out \
            -w /work \
            trailofbits/eth-security-toolbox@sha256:a60d69da3d7f3fb444be052f93caecac0b560085bf2ccf9c3dcb5386d7532fa9 \
            bash -c '
              solc-select use 0.7.6 >/dev/null
              # Slither exit codes:
              #   0   = no findings
              #   255 = findings (informational+) -- expected, we baseline these
              # Anything else (compile failure, crash) -- bubble up as job failure.
              set +e
              slither GPv2Settlement.sol --compile-force-framework solc --json /out/settlement.json
              rc_settlement=$?
              slither GPv2AllowListAuthentication.sol --compile-force-framework solc --json /out/auth.json
              rc_auth=$?
              slither GPv2VaultRelayer.sol --compile-force-framework solc --json /out/vault.json
              rc_vault=$?
              slither reader/AllowListStorageReader.sol --compile-force-framework solc --json /out/allowlist-reader.json
              rc_allow_reader=$?
              slither reader/SettlementStorageReader.sol --compile-force-framework solc --json /out/settlement-reader.json
              rc_settle_reader=$?
              set -e
              for rc in $rc_settlement $rc_auth $rc_vault $rc_allow_reader $rc_settle_reader; do
                if [ "$rc" != "0" ] && [ "$rc" != "255" ]; then
                  echo "Slither crashed with rc=$rc (not a findings code)"
                  exit $rc
                fi
              done
            '
          # Sanity: all JSONs must be non-empty
          for f in /tmp/slither-out/settlement.json /tmp/slither-out/auth.json \
                   /tmp/slither-out/vault.json \
                   /tmp/slither-out/allowlist-reader.json \
                   /tmp/slither-out/settlement-reader.json; do
            if [ ! -s "$f" ]; then
              echo "FAIL: $f is missing or empty -- slither did not produce output"
              exit 2
            fi
            n=$(python3 -c "import json; print(len(json.load(open('$f'))['results']['detectors']))")
            echo "$f: $n raw findings"
          done

      - name: Diff findings vs committed baseline
        run: |
          python3 scripts/slither-baseline.py \
            --check audit/slither-baseline.json \
            /tmp/slither-out/settlement.json \
            /tmp/slither-out/auth.json \
            /tmp/slither-out/vault.json \
            /tmp/slither-out/allowlist-reader.json \
            /tmp/slither-out/settlement-reader.json

      - name: Upload Slither JSON
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: slither-${{ github.sha }}
          path: /tmp/slither-out/
          retention-days: 30

  pnpm-audit:
    name: pnpm audit (JS/TS deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit --prod
        run: |
          # --prod skips devDeps; we care about runtime CVEs.
          # `|| true` because pnpm audit exits non-zero on ANY advisory.
          pnpm audit --prod --json > /tmp/pnpm-audit.json || true
          cat /tmp/pnpm-audit.json

      - name: Block on HIGH or CRITICAL advisories
        run: |
          python3 - <<'PYEOF'
          import json, sys
          with open('/tmp/pnpm-audit.json') as f:
              d = json.load(f)
          advisories = d.get('advisories', {})
          blocking = []
          for k, adv in advisories.items():
              sev = adv.get('severity', '')
              if sev in ('high', 'critical'):
                  blocking.append(f"{adv.get('module_name','?')} (sev={sev}, advisory={k}): {adv.get('title','?')}")
          if blocking:
              print(f"BLOCKING: {len(blocking)} HIGH/CRITICAL advisories")
              for b in blocking:
                  print(f"  - {b}")
              sys.exit(1)
          print(f"OK -- {len(advisories)} total advisories, none HIGH/CRITICAL")
          PYEOF

  cargo-audit:
    name: cargo audit (Rust deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        # cargo audit's default: exits non-zero on vulnerabilities (HIGH/
        # CRITICAL effectively). Without --deny warnings it tolerates
        # informational advisories like the current rand-rng-soundness
        # one (RUSTSEC-2026-0097), which isn't exploitable in our context
        # (we use tracing, not a custom logger).
        run: |
          cd apps/backend
          cargo audit

      - name: Show advisory database version
        if: always()
        run: cargo audit --version

  cargo-deny:
    name: cargo deny (Rust supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pinned to a specific minor version for stable advisory-db fetch
      # semantics + config schema. Bump intentionally.
      - name: Install cargo-deny
        run: cargo install --locked --version 0.19.6 cargo-deny

      - name: Run cargo deny (advisories + sources, strict)
        # Strict subset: advisories (CVEs) + sources (registry/git pins).
        # Licenses + bans are informational only — see deny.toml.
        run: |
          cd apps/backend
          cargo deny check advisories sources

      - name: Run cargo deny (bans + licenses, informational)
        # Non-gating; surfaces workspace-internal noise (path-dep
        # wildcards, missing license fields on unpublished crates).
        if: always()
        run: |
          cd apps/backend
          cargo deny check bans licenses || echo "informational: bans/licenses report above is non-gating"

