name: Security

# Runs on every PR targeting main / docs/* / feat/* branches, on
# workflow_dispatch for ad-hoc runs, and weekly on a Monday cron.
#
# WHY the cron: new RUSTSEC/GHSA advisories are published against deps that
# are already on main. Between PRs (or on a quiet week) a fresh HIGH/CRITICAL
# went unnoticed until the next PR happened to open (the class behind the
# repo-wide red-CI surprise, PR #786). The weekly run closes that gap.
#
# WHICH jobs run on the cron: ONLY the time-sensitive advisory jobs
# (cargo-audit, cargo-deny, pnpm-audit, pnpm-audit-frontend, contracts-yarn-audit) plus the
# secret scan (gitleaks). The input-invariant gates (partner-fee / floor /
# tier / erpc / policy-pack) and Slither depend only on repo contents a PR
# already exercised, so they are skipped on schedule via
# `if: github.event_name != 'schedule'` to avoid noise on main.
#
# Jobs:
#   - slither             Solidity static analysis (Trail of Bits)
#   - pnpm-audit          root-workspace JS/TS dep advisories (FULL tree)
#   - pnpm-audit-frontend apps/frontend (separate workspace) dep advisories
#   - contracts-yarn-audit legacy contracts deploy/test toolchain advisories
#   - cargo-audit         Rust dep advisories
#   - cargo-deny          Rust supply-chain (advisories + sources)
#   - gitleaks            raw EVM-private-key secret scan
#
# Each advisory job blocks merge if it regresses against the audit baseline.

on:
  pull_request:
    branches:
      - main
      - 'docs/**'
      - 'feat/**'
  workflow_dispatch:
  schedule:
    # Weekly Monday 05:00 UTC (codeql.yml runs at 04:00). Scheduled runs
    # execute on main, where a failing advisory job alerts but blocks nothing.
    - cron: '0 5 * * 1'

# Default to read-only — fork PRs do not need write access. Audit
# finding 2026-05-09 (matches ci.yml).
permissions:
  contents: read

jobs:
  partner-fee-invariant:
    name: Partner-fee cross-workspace invariant
    runs-on: ubuntu-latest
    # Input-invariant gate: depends only on repo contents a PR already
    # exercised, so skip it on the weekly cron (advisory jobs only there).
    if: github.event_name != 'schedule'
    # Phase 2.3 (2026-05-20). The Ophis partner-fee recipient is declared
    # as OPHIS_PARTNER_FEE_RECIPIENT in 3 source-of-truth files in
    # DIFFERENT pnpm workspaces (no shared-import option). PR #120 fixed
    # a drift that had shipped to mainnet for 4 days; this job prevents
    # the class entirely by failing CI if any of the 3 literals diverges
    # from the canonical Safe address.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check 3 source-of-truth files match canonical Safe address
        run: ./scripts/check-partner-fee-invariant.sh

  floor-invariant:
    name: OP partner-fee floor cross-workspace invariant
    runs-on: ubuntu-latest
    # Input-invariant gate: skip on the weekly cron (advisory jobs only).
    if: github.event_name != 'schedule'
    # 2026-06-18. The OP backend floors the CIP-75 Volume partner fee per token
    # pair (app_data.rs partner_fee_floor_bps): 10 bps default, 1 bp for
    # same-chain stable pairs (OPTIMISM_STABLECOINS) or boosted pairs
    # (OPTIMISM_BOOSTED_TOKENS). The frontend + SDK charge the matching sets AND
    # values from their OWN copies in separate pnpm workspaces (no shared
    # import). Any drift makes the backend floor reject legitimate reduced-rate
    # orders at ingress (PartnerFeeBelowFloor). A Rust unit test also guards the
    # stablecoin set, but the backend Rust suite is NOT run in CI, so this pure
    # grep/awk script is the actual hard gate for the cross-workspace inputs:
    # the OPTIMISM_STABLECOINS set, the OP OPTIMISM_BOOSTED_TOKENS set, and the
    # 10 / 1 floor values across backend + frontend + SDK. (It does NOT cover the
    # floor-LOGIC Rust tests, which remain CI-unverified; see security.yml notes.)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check OP partner-fee floor inputs match across frontend + backend + SDK
        run: ./scripts/check-floor-invariant.sh

  tier-invariant:
    name: Tier table cross-workspace invariant
    runs-on: ubuntu-latest
    # Input-invariant gate: skip on the weekly cron (advisory jobs only).
    if: github.event_name != 'schedule'
    # 2026-05-21 follow-up to the rebate-indexer audit; extended 2026-06-09 to
    # the frontend mirror. TIERS + POOL_SPLIT_BPS are mirrored across THREE files:
    # apps/rebate-indexer/src/tiers.ts (drives the batcher's actual WETH
    # allocation per wallet), packages/sdk/src/tiers.ts (@ophis/sdk), and
    # apps/frontend/apps/cowswap-frontend/src/ophis/tiers.ts (the swap-page chip
    # showing users their projected rebate %). Drift would silently misallocate
    # real WETH or misdisplay tiers. Hard CI gate via a Python canonicalizer that
    # strips comments and NUMERIC-normalizes (0.5 == 0.50, 5_000 == 5000) so only
    # a real semantic divergence fails.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check tiers.ts mirror across rebate-indexer + packages/sdk + cowswap-frontend
        run: ./scripts/check-tier-invariant.sh


  infra-compose-security:
    name: Infra compose security invariants
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check auth parity and pinned RPC proxy image requirements
        run: ./scripts/check-infra-compose-security.py

  erpc-id-collisions:
    name: eRPC upstream-ID cross-stack collision lint
    runs-on: ubuntu-latest
    # Input-invariant gate: skip on the weekly cron (advisory jobs only).
    if: github.event_name != 'schedule'
    # Phase 2.6 (2026-05-20). Catches the cross-stack ID-naming
    # collision class. eRPC exports per-upstream Prometheus metrics
    # labeled by `id:`. If two stacks share an upstream id, the same
    # metric label gets two different sources and dashboards mis-
    # attribute load.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Assert each chain's eRPC upstream IDs are suffixed and unique
        run: ./scripts/check-erpc-id-collisions.sh

  policy-pack-address-invariant:
    name: Agent-wallet policy-pack address invariant
    runs-on: ubuntu-latest
    # Input-invariant gate: skip on the weekly cron (advisory jobs only).
    if: github.event_name != 'schedule'
    # 2026-07-04. The Turnkey/Privy agent-wallet policy packs in
    # examples/agent-wallet-policy-packs/ pin an agent key to the Ophis
    # settlement + vault-relayer contracts per chain. Those addresses live in a
    # hand-maintained table (addresses.json) that MUST stay byte-identical to
    # OPHIS_SETTLEMENT_ADDRESSES / OPHIS_VAULT_RELAYER_ADDRESSES in
    # packages/sdk/src/domain.ts. If a chain is added or an address rotated in
    # the SDK but not the pack, a pack would authorize the wrong contract. This
    # pure-Node check (no deps) is the hard gate; it also asserts the paused /
    # testnet chains stay OUT of the packs and that the literals are present in
    # the docs + README collateral.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
      - name: Diff policy-pack addresses against @ophis/sdk domain map
        run: node scripts/check-policy-pack-addresses.mjs

  slither:
    name: Slither (Solidity)
    runs-on: ubuntu-latest
    # Skip on the weekly cron: Slither's findings only change when the
    # (vendored, frozen) contracts change, which a PR already exercises, so
    # it is not a time-sensitive advisory job. Only cargo-audit, cargo-deny,
    # pnpm-audit, pnpm-audit-frontend, and gitleaks run on schedule.
    if: github.event_name != 'schedule'
    # Runs Trail of Bits' eth-security-toolbox container (digest-pinned
    # for reproducibility). The container ships slither 0.11.4, foundry,
    # and solc-select with 0.7.6 pre-installed. Earlier pip-only setups
    # (PR #23 rounds 1-7, PR #26) silently failed in CI because slither
    # auto-invokes `forge` for project detection — even in file-list
    # mode — and the runner lacks foundry by default. The container
    # bypasses that.
    #
    # Gating: per-finding fingerprint diff vs audit/slither-baseline.json
    # (see scripts/slither-baseline.py). Net-new fingerprints fail the
    # job; baseline-known findings stay green. Refresh the baseline by
    # running `scripts/slither-baseline.py --generate ...` after audit.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # File-list mode: production CoW Protocol contracts (Settlement,
      # AllowListAuth + transitively-imported mixins/libs) use only
      # relative imports, so solc resolves from file paths alone. Test
      # files (src/contracts/test/*, ./test/*) use OpenZeppelin +
      # forge-std but are not deployed — out of scope.
      - name: Run Slither (production contracts)
        run: |
          # World-writable so the container's internal user can write
          # JSON output into the bind mount. The Trail of Bits image
          # ships solc-select / slither under a specific user; overriding
          # --user $(id -u) (the first thing we tried) puts the container
          # in a PATH where those binaries aren't installed (slither and
          # solc-select both `command not found`). chmod 0777 lets the
          # image's own user write through the bind without changing the
          # PATH context.
          mkdir -p /tmp/slither-out
          chmod 0777 /tmp/slither-out
          docker run --rm \
            -v "${{ github.workspace }}/contracts/src/contracts:/work" \
            -v /tmp/slither-out:/out \
            -w /work \
            trailofbits/eth-security-toolbox@sha256:a60d69da3d7f3fb444be052f93caecac0b560085bf2ccf9c3dcb5386d7532fa9 \
            bash -c '
              solc-select use 0.7.6 >/dev/null
              # Slither exit codes:
              #   0   = no findings
              #   255 = findings (informational+) -- expected, we baseline these
              # Anything else (compile failure, crash) -- bubble up as job failure.
              set +e
              slither GPv2Settlement.sol --compile-force-framework solc --json /out/settlement.json
              rc_settlement=$?
              slither GPv2AllowListAuthentication.sol --compile-force-framework solc --json /out/auth.json
              rc_auth=$?
              slither GPv2VaultRelayer.sol --compile-force-framework solc --json /out/vault.json
              rc_vault=$?
              slither reader/AllowListStorageReader.sol --compile-force-framework solc --json /out/allowlist-reader.json
              rc_allow_reader=$?
              slither reader/SettlementStorageReader.sol --compile-force-framework solc --json /out/settlement-reader.json
              rc_settle_reader=$?
              set -e
              for rc in $rc_settlement $rc_auth $rc_vault $rc_allow_reader $rc_settle_reader; do
                if [ "$rc" != "0" ] && [ "$rc" != "255" ]; then
                  echo "Slither crashed with rc=$rc (not a findings code)"
                  exit $rc
                fi
              done
            '
          # Sanity: all JSONs must be non-empty
          for f in /tmp/slither-out/settlement.json /tmp/slither-out/auth.json \
                   /tmp/slither-out/vault.json \
                   /tmp/slither-out/allowlist-reader.json \
                   /tmp/slither-out/settlement-reader.json; do
            if [ ! -s "$f" ]; then
              echo "FAIL: $f is missing or empty -- slither did not produce output"
              exit 2
            fi
            n=$(python3 -c "import json; print(len(json.load(open('$f'))['results']['detectors']))")
            echo "$f: $n raw findings"
          done

      - name: Diff findings vs committed baseline
        run: |
          python3 scripts/slither-baseline.py \
            --check audit/slither-baseline.json \
            /tmp/slither-out/settlement.json \
            /tmp/slither-out/auth.json \
            /tmp/slither-out/vault.json \
            /tmp/slither-out/allowlist-reader.json \
            /tmp/slither-out/settlement-reader.json

      - name: Upload Slither JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: slither-${{ github.sha }}
          path: /tmp/slither-out/
          retention-days: 30


  contracts-yarn-audit:
    name: yarn audit (contracts legacy toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: contracts/yarn.lock

      - name: Install contracts dependencies
        working-directory: contracts
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Run contracts yarn audit
        working-directory: contracts
        run: |
          yarn audit --json > /tmp/contracts-yarn-audit.jsonl || true
          cat /tmp/contracts-yarn-audit.jsonl

      - name: Block audit regressions above documented baseline
        run: scripts/contracts-audit-gate.py /tmp/contracts-yarn-audit.jsonl audit/contracts-yarn-audit-baseline.json

  pnpm-audit:
    name: pnpm audit (JS/TS deps)
    runs-on: ubuntu-latest
    # Audits the FULL root workspace tree, NOT --prod. --prod scopes to
    # dependencies + optionalDependencies only, which SKIPS the build/test
    # devDependencies that compile and test the npm-PUBLISHED packages
    # (@ophis/sdk, @ophis/agent-swap, @ophis/plugin-goat, @ophis/agentkit-ophis,
    # @ophis/widget-react) and are therefore a supply-chain surface (audit
    # 2026-06 P2, same principle the sibling pnpm-audit-frontend job documents).
    # Uses the frontend job's fail-closed gate. Documented non-reachable
    # advisories with no fix are ignored below; keep that list TIGHT.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (root workspace, incl. devDependencies)
        run: |
          # FULL tree, NOT --prod: the root devDependencies build and test the
          # npm-published @ophis packages, so an advisory in that toolchain must
          # block. `|| true` because pnpm audit exits non-zero on ANY advisory;
          # the python step below decides what actually blocks (HIGH/CRITICAL).
          pnpm audit --json > /tmp/pnpm-audit.json || true
          cat /tmp/pnpm-audit.json

      - name: Block on NEW HIGH or CRITICAL advisories
        run: |
          python3 - <<'PYEOF'
          import json, sys
          # Documented advisories with no upstream fix. Keep TIGHT -- every entry
          # needs a written justification.
          IGNORE = {
              # bigint-buffer Buffer Overflow via toBigIntLE() (HIGH). Reaches the
              # tree ONLY through @coinbase/agentkit (a devDep satisfying
              # agentkit-ophis's peer dep) -> @solana/spl-token ->
              # buffer-layout-utils. The Solana spl-token path is unreachable for
              # Ophis, dev/test-only, not in any published tarball, and NO patched
              # release exists (patched '<0.0.0'). (audit 2026-07)
              'GHSA-3gc7-fjrx-p6mg',
          }
          # NB: elliptic (CVE-2025-14505) is npm-severity LOW with no fixed
          # release, so it never enters the HIGH/CRITICAL block path below and
          # needs no IGNORE entry. uuid CVE-2026-41907 (moderate) is FIXED by the
          # root pnpm override '@metamask/utils>uuid': '^11.1.1' in package.json.
          def ghsa(url):
              return (url or '').rstrip('/').split('/')[-1]
          with open('/tmp/pnpm-audit.json') as f:
              d = json.load(f)

          blocking, ignored, shape = [], [], None
          # Shape A (npm-v6 / current pnpm): advisories = { id: {severity, module_name, url, title} }
          adv = d.get('advisories')
          if isinstance(adv, dict):
              shape = 'advisories'
              for k, a in adv.items():
                  if a.get('severity') not in ('high', 'critical'):
                      continue
                  g = ghsa(a.get('url')) or str(k)
                  rec = f"{a.get('module_name','?')} (sev={a.get('severity')}, {g}): {a.get('title','?')}"
                  (ignored if g in IGNORE else blocking).append(rec)
          # Shape B (npm-v7): vulnerabilities = { name: {severity, via: [{url,title}|str]} }
          vuln = d.get('vulnerabilities')
          if isinstance(vuln, dict) and vuln:
              shape = shape or 'vulnerabilities'
              for name, a in vuln.items():
                  if a.get('severity') not in ('high', 'critical'):
                      continue
                  gs = [ghsa(v.get('url')) for v in (a.get('via') or []) if isinstance(v, dict)]
                  gs = [g for g in gs if g]
                  rec = f"{name} (sev={a.get('severity')}, {','.join(gs) or '?'})"
                  # Ignore only if EVERY contributing advisory is allow-listed.
                  (ignored if gs and all(g in IGNORE for g in gs) else blocking).append(rec)

          # Fail CLOSED: never silently pass on an unrecognized/empty audit shape.
          meta_v = (d.get('metadata') or {}).get('vulnerabilities') or {}
          meta_hc = (meta_v.get('high') or 0) + (meta_v.get('critical') or 0)
          if shape is None:
              print("ERROR: unrecognized pnpm audit JSON (no advisories/vulnerabilities) -- failing closed.", file=sys.stderr)
              sys.exit(1)
          if meta_hc > 0 and not blocking and not ignored:
              print(f"ERROR: metadata reports {meta_hc} high/critical but parser matched none "
                    f"(shape='{shape}' mismatch?) -- failing closed.", file=sys.stderr)
              sys.exit(1)

          for i in ignored:
              print(f"IGNORED (documented non-reachable): {i}")
          if blocking:
              print(f"BLOCKING: {len(blocking)} HIGH/CRITICAL advisories in the root workspace")
              for b in blocking:
                  print(f"  - {b}")
              sys.exit(1)
          print(f"OK -- shape={shape}, none blocking ({len(ignored)} ignored, metadata high/crit={meta_hc})")
          PYEOF

  pnpm-audit-frontend:
    name: pnpm audit (frontend deps)
    runs-on: ubuntu-latest
    # apps/frontend is its OWN pnpm workspace (cowswap upstream ships its own
    # package manager) with a separate lockfile, so the root pnpm-audit job above
    # does NOT cover it — the largest, browser-facing dependency tree. This job
    # closes that gap (audit 2026-06 P3: a `tmp` HIGH had stayed green because the
    # frontend was never audited in CI). It audits the FULL tree incl.
    # devDependencies (NOT --prod), since build-time deps compile the browser
    # bundle and are a supply-chain surface (audit 2026-06 P2). Documented
    # non-reachable advisories are ignored below; keep that list TIGHT (each entry
    # needs a written reason).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788  # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Run pnpm audit (frontend workspace, incl. devDependencies)
        working-directory: apps/frontend
        run: |
          # Audit the FULL dependency tree, NOT --prod. `--prod` scopes to
          # dependencies + optionalDependencies only, which would SKIP exactly the
          # class this job exists to guard: build-time devDependencies
          # (Nx/webpack/vite/patch-package) that compile the browser bundle, and
          # are therefore a supply-chain surface. Concretely, the `tmp` HIGH this
          # job was added for is pulled in via the devDependency patch-package
          # (package.json), so a --prod audit never saw it — the gate skipped the
          # very thing it claimed to cover. (audit 2026-06 P2)
          # pnpm audit reads apps/frontend/pnpm-lock.yaml directly (no install
          # needed). `|| true` because it exits non-zero on ANY advisory; the
          # python step below decides what actually blocks (HIGH/CRITICAL only).
          pnpm audit --json > /tmp/fe-audit.json || true
          cat /tmp/fe-audit.json

      - name: Block on NEW HIGH or CRITICAL advisories
        run: |
          python3 - <<'PYEOF'
          import json, sys
          # Documented, non-runtime-reachable advisories with no upstream fix.
          # Keep TIGHT — every entry needs a written justification.
          IGNORE = {
              # `ip` SSRF (improper isPublic categorization): transitive
              # Trezor -> socks -> ip, Node-only / browser-unreachable, no patch,
              # already pinned to latest 2.0.1. (audit 2026-06)
              'GHSA-2p57-rm9w-gvfp',
          }
          def ghsa(url):
              return (url or '').rstrip('/').split('/')[-1]
          with open('/tmp/fe-audit.json') as f:
              d = json.load(f)

          blocking, ignored, shape = [], [], None
          # Shape A (npm-v6 / current pnpm): advisories = { id: {severity, module_name, url, title} }
          adv = d.get('advisories')
          if isinstance(adv, dict):
              shape = 'advisories'
              for k, a in adv.items():
                  if a.get('severity') not in ('high', 'critical'):
                      continue
                  g = ghsa(a.get('url')) or str(k)
                  rec = f"{a.get('module_name','?')} (sev={a.get('severity')}, {g}): {a.get('title','?')}"
                  (ignored if g in IGNORE else blocking).append(rec)
          # Shape B (npm-v7): vulnerabilities = { name: {severity, via: [{url,title}|str]} }
          vuln = d.get('vulnerabilities')
          if isinstance(vuln, dict) and vuln:
              shape = shape or 'vulnerabilities'
              for name, a in vuln.items():
                  if a.get('severity') not in ('high', 'critical'):
                      continue
                  gs = [ghsa(v.get('url')) for v in (a.get('via') or []) if isinstance(v, dict)]
                  gs = [g for g in gs if g]
                  rec = f"{name} (sev={a.get('severity')}, {','.join(gs) or '?'})"
                  # Ignore only if EVERY contributing advisory is allow-listed.
                  (ignored if gs and all(g in IGNORE for g in gs) else blocking).append(rec)

          # Fail CLOSED: never silently pass on an unrecognized/empty audit shape.
          meta_v = (d.get('metadata') or {}).get('vulnerabilities') or {}
          meta_hc = (meta_v.get('high') or 0) + (meta_v.get('critical') or 0)
          if shape is None:
              print("ERROR: unrecognized pnpm audit JSON (no advisories/vulnerabilities) — failing closed.", file=sys.stderr)
              sys.exit(1)
          if meta_hc > 0 and not blocking and not ignored:
              print(f"ERROR: metadata reports {meta_hc} high/critical but parser matched none "
                    f"(shape='{shape}' mismatch?) — failing closed.", file=sys.stderr)
              sys.exit(1)

          for i in ignored:
              print(f"IGNORED (documented non-reachable): {i}")
          if blocking:
              print(f"BLOCKING: {len(blocking)} HIGH/CRITICAL advisories in apps/frontend")
              for b in blocking:
                  print(f"  - {b}")
              sys.exit(1)
          print(f"OK -- shape={shape}, none blocking ({len(ignored)} ignored, metadata high/crit={meta_hc})")
          PYEOF

  cargo-audit:
    name: cargo audit (Rust deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cargo-audit
        # `cargo install` occasionally drops its crates.io TLS connection
        # mid-download (curl [55] SSL_ERROR_SYSCALL while fetching a transitive
        # dependency of cargo-audit's own toolchain), which fails the whole job
        # on a pure network blip, not a real advisory. Retry with backoff so a
        # single TLS drop does not fail CI; the final attempt still surfaces a
        # genuine, persistent install failure.
        run: |
          for attempt in 1 2 3; do
            if cargo install --locked cargo-audit; then
              exit 0
            fi
            echo "::warning::cargo install cargo-audit failed (attempt ${attempt}/3); retrying after backoff"
            sleep $((attempt * 15))
          done
          echo "::error::cargo install cargo-audit failed after 3 attempts"
          exit 1

      - name: Run cargo audit
        # cargo audit's default: exits non-zero on vulnerabilities (HIGH/
        # CRITICAL effectively). Without --deny warnings it tolerates
        # informational advisories like the current rand-rng-soundness
        # one (RUSTSEC-2026-0097), which isn't exploitable in our context
        # (we use tracing, not a custom logger).
        run: |
          cd apps/backend
          cargo audit

      - name: Show advisory database version
        if: always()
        run: cargo audit --version

  cargo-deny:
    name: cargo deny (Rust supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pinned to a specific minor version for stable advisory-db fetch
      # semantics + config schema. Bump intentionally.
      - name: Install cargo-deny
        # Same transient-TLS guard as the cargo-audit install above: a dropped
        # crates.io connection during `cargo install` fails the job on a pure
        # network blip. Retry with backoff; a persistent failure still fails the
        # job on the final attempt.
        run: |
          for attempt in 1 2 3; do
            if cargo install --locked --version 0.19.6 cargo-deny; then
              exit 0
            fi
            echo "::warning::cargo install cargo-deny failed (attempt ${attempt}/3); retrying after backoff"
            sleep $((attempt * 15))
          done
          echo "::error::cargo install cargo-deny failed after 3 attempts"
          exit 1

      - name: Run cargo deny (advisories + sources, strict)
        # Strict subset: advisories (CVEs) + sources (registry/git pins).
        # Licenses + bans are informational only — see deny.toml.
        run: |
          cd apps/backend
          cargo deny check advisories sources

      - name: Run cargo deny (bans + licenses, informational)
        # Non-gating; surfaces workspace-internal noise (path-dep
        # wildcards, missing license fields on unpublished crates).
        if: always()
        run: |
          cd apps/backend
          cargo deny check bans licenses || echo "informational: bans/licenses report above is non-gating"

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    # Closes the one gap GitHub's provider-pattern secret scanning does NOT
    # cover: raw EVM private keys (0x + 64 hex), e.g. the money-moving
    # OPHIS_DRIVER_SUBMITTER_KEY. GitHub secret scanning + push protection stay
    # ON (they handle AWS/GitHub/npm/etc. provider patterns); this job adds only
    # the EVM-key rule so it does not duplicate that coverage or add provider
    # false positives. Runs on PR + schedule + dispatch (intentionally NOT gated
    # off the cron: a weekly full-history sweep is worth having). Rules +
    # allowlist (bytes32 / topic0 / init-code-hash noise, Anvil test keys,
    # generated artifacts) live in .github/gitleaks.toml. Free on public repos.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history so the commits a PR introduces are scanned (and the
          # weekly run sweeps all history), not just the tip.
          fetch-depth: 0
      # Use the gitleaks CLI binary directly (Apache-2.0, free), NOT
      # gitleaks/gitleaks-action -- that action requires a paid GITLEAKS_LICENSE
      # for ANY organization repo (public or private), which we do not buy. The
      # CLI has no such gate. Pinned to a specific release for supply-chain
      # integrity.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --config .github/gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1

