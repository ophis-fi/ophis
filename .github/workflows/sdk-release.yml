name: Publish @ophis/sdk to npm

# Publishes packages/sdk to npm on a `sdk-v*` tag (e.g. `sdk-v0.0.1`) or manual
# dispatch. Requires the repo secret NPM_TOKEN (an npm automation token with
# publish rights to the @ophis scope). Provenance is attested via OIDC
# (id-token: write). Runs only on a release tag, so it costs near-zero minutes.
#
# Security: the only secret (NPM_TOKEN) is passed via env: (never inline in a
# run:), no untrusted github.event.* input is interpolated, and all actions are
# pinned to commit SHAs.

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm --filter @ophis/sdk build

      - name: test
        run: pnpm --filter @ophis/sdk test

      - name: publish
        run: pnpm --filter @ophis/sdk publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
