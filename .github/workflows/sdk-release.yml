name: Publish @ophis/sdk to npm

# Publishes packages/sdk to npm on a `sdk-v*` tag (e.g. `sdk-v0.0.1`) or manual
# dispatch. Requires the repo secret NPM_TOKEN (an npm automation token with
# publish rights to the @ophis scope). Provenance is attested via OIDC
# (id-token: write). Runs only on a release tag, so it costs near-zero minutes.
#
# Security: the only secret (NPM_TOKEN) is passed via env: (never inline in a
# run:), no untrusted github.event.* input is interpolated, and all actions are
# pinned to commit SHAs.

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Bind the published version to the reviewed tag: the sdk-v<x.y.z> tag
      # suffix must equal packages/sdk/package.json `version`. The tag is read
      # from the GITHUB_REF_NAME env var (never interpolated into the shell) to
      # avoid expression injection.
      - name: verify tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./packages/sdk/package.json').version")"
          TAG_VERSION="${TAG#sdk-v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG (version $TAG_VERSION) != package.json version $PKG_VERSION" >&2
            exit 1
          fi
          echo "tag matches package version $PKG_VERSION"

      # --ignore-scripts: do NOT run third-party dependency lifecycle scripts
      # during install in this token-bearing publish job (pnpm 9 runs them by
      # default). The @ophis/sdk build is invoked explicitly below, so disabling
      # dependency install scripts is safe and removes a supply-chain code-exec
      # surface on the runner that holds NPM_TOKEN.
      - name: install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: build
        run: pnpm --filter @ophis/sdk build

      - name: test
        run: pnpm --filter @ophis/sdk test

      # --ignore-scripts here too: dist/ is already built explicitly above, so
      # publish must NOT re-run prepublishOnly (tsc) inside this step where
      # NODE_AUTH_TOKEN is in env. Publishing the pre-built artifact with no
      # lifecycle scripts removes the last untrusted-code window next to the token.
      - name: publish
        run: pnpm --filter @ophis/sdk publish --no-git-checks --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
