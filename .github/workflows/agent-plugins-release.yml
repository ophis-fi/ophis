name: Publish @ophis agent plugins to npm

# Publishes packages/agent-swap, packages/plugin-goat, packages/agentkit-ophis, packages/plugin-elizaos to npm on an
# `agent-plugins-v*` tag (e.g. `agent-plugins-v0.1.0`). The three share a version; the tag suffix
# must equal all four package.json `version`s. They are published in DEPENDENCY ORDER — agent-swap
# first, because plugin-goat, agentkit-ophis and plugin-elizaos depend on it (pnpm rewrites `workspace:*` to the
# concrete published versions at pack time). Requires the repo secret NPM_TOKEN (an npm automation
# token with publish rights to the @ophis scope). Provenance is attested via OIDC (id-token: write).
#
# Security: the only secret (NPM_TOKEN) is passed via env: (never inline in a run:), no untrusted
# github.event.* input is interpolated, all actions are pinned to commit SHAs, and --ignore-scripts
# is used throughout so no third-party lifecycle script executes next to the token.

on:
  push:
    tags:
      - 'agent-plugins-v*'

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish:
    name: build + publish (agent-swap → plugin-goat, agentkit-ophis, plugin-elizaos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Bind the published versions to the reviewed tag: the agent-plugins-v<x.y.z> suffix must equal
      # EACH package's package.json version. The tag is read from env (never interpolated) to avoid
      # expression injection.
      - name: verify tag matches all three package versions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#agent-plugins-v}"
          for pkg in agent-swap plugin-goat agentkit-ophis plugin-elizaos; do
            PKG_VERSION="$(node -p "require('./packages/$pkg/package.json').version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::tag $TAG (version $TAG_VERSION) != packages/$pkg version $PKG_VERSION" >&2
              exit 1
            fi
          done
          echo "tag matches all four package versions ($TAG_VERSION)"

      # --ignore-scripts: do NOT run third-party dependency lifecycle scripts during install in this
      # token-bearing job (pnpm 9 runs them by default). Each package's build is invoked explicitly
      # below, so disabling dependency install scripts is safe and removes a supply-chain code-exec
      # surface on the runner that holds NPM_TOKEN.
      - name: install
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Build in dependency order so each package typechecks against its deps' emitted .d.ts.
      - name: build
        run: |
          pnpm --filter @ophis/sdk build
          pnpm --filter @ophis/agent-swap build
          pnpm --filter @ophis/plugin-goat build
          pnpm --filter @ophis/agentkit-ophis build
          pnpm --filter @ophis/plugin-elizaos build

      - name: test
        run: pnpm --filter @ophis/agent-swap test

      # Publish in dependency order. agent-swap FIRST (the adapters require it). --ignore-scripts so
      # publish does not re-run prepublishOnly (dist is already built above) inside the step where
      # NODE_AUTH_TOKEN is in env.
      - name: publish @ophis/agent-swap
        run: pnpm --filter @ophis/agent-swap publish --no-git-checks --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @ophis/plugin-goat
        run: pnpm --filter @ophis/plugin-goat publish --no-git-checks --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @ophis/agentkit-ophis
        run: pnpm --filter @ophis/agentkit-ophis publish --no-git-checks --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @ophis/plugin-elizaos
        run: pnpm --filter @ophis/plugin-elizaos publish --no-git-checks --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
