name: Echidna fuzz

# Runs the Trail of Bits Echidna property-based fuzzer against the
# AllowList authentication harness at contracts/echidna/E2EAllowList.sol.
#
# Two triggers:
#   - workflow_dispatch (operator-triggered with a custom test budget)
#   - schedule weekly Monday 03:00 UTC (background regression check)
#
# Echidna failures surface as job failures + an artifact upload (the
# call-sequence shrunk counterexample) for triage. Any counterexample
# is a real bug — no baseline of expected failures.
#
# SECURITY: this workflow only uses ${{ github.workspace }} and
# ${{ github.sha }} — both system-controlled, not user-tainted. The
# manual `test_limit` input is numeric-only and never reaches a shell
# context (used only in a future enhancement; currently echidna.yaml
# determines the limit).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  echidna:
    name: Echidna — AllowList + AllowListGuardian
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Persist the fuzzing corpus across runs so each weekly run DEEPENS
      # accumulated coverage instead of restarting from an empty corpus.
      # actions/cache (not download-artifact): the upload artifact below is
      # sha-keyed (echidna-${{ github.sha }}), so there is no stable name to
      # fetch, and download-artifact needs run-id + token plumbing to reach a
      # prior run. The exact key is unique per run (always a miss), so
      # restore-keys pulls the newest prior corpus and this run saves an updated
      # one at post-job. CAVEAT: GitHub evicts caches unused for 7 days (= this
      # weekly cadence), so the 90-day artifact upload below stays as a backstop.
      - name: Restore/seed Echidna corpus cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: /tmp/echidna-out
          key: echidna-corpus-${{ github.run_id }}
          restore-keys: |
            echidna-corpus-

      - name: Run Echidna in TOB toolbox
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p /tmp/echidna-out
          # Recursive: corpus files restored from cache are owned by the runner
          # user, but the TOB container writes as the (non-root) ethsec user and
          # must be able to overwrite them, so make the whole tree writable.
          chmod -R 0777 /tmp/echidna-out
          # The TOB toolbox runs as the (non-root) `ethsec` user, and
          # crytic-compile writes its `crytic-export/` into the CWD (/work).
          # On current runner images the checked-out contracts dir is not
          # writable by that container user, so make the mounted dir
          # world-writable here (ephemeral CI checkout) — otherwise the
          # compile step dies with `PermissionError: ... 'crytic-export'`.
          chmod 0777 "${WORKSPACE}/contracts"
          # Same digest-pinned TOB image as security.yml's Slither job.
          # Run from the contracts root (/work), NOT cd echidna: the harnesses
          # import `../src/...`, which must fall inside solc's allow-paths
          # (running from echidna/ put src/ out of scope -> "File not found").
          # Force istanbul: foundry.toml targets `cancun`, which solc 0.7.6
          # (the production pin) rejects; FOUNDRY_EVM_VERSION makes
          # crytic-compile pass a 0.7.6-compatible EVM version.
          docker run --rm \
            -v "${WORKSPACE}/contracts:/work" \
            -v /tmp/echidna-out:/out \
            -w /work \
            -e FOUNDRY_EVM_VERSION=istanbul \
            trailofbits/eth-security-toolbox@sha256:a60d69da3d7f3fb444be052f93caecac0b560085bf2ccf9c3dcb5386d7532fa9 \
            bash -c '
              # pipefail is REQUIRED: each echidna run is piped through tee, and
              # without it the pipeline exit status is the tee status (0), which
              # masks an invariant/compile failure and lets the job pass when a
              # harness actually failed.
              set -eo pipefail
              solc-select use 0.7.6 >/dev/null 2>&1
              export FOUNDRY_EVM_VERSION=istanbul
              # contract name == file stem for both harnesses.
              for h in E2EAllowList E2EAllowListGuardian; do
                echo "=== echidna ${h} ==="
                echidna "echidna/${h}.sol" \
                  --contract "${h}" \
                  --config echidna/echidna.yaml \
                  --corpus-dir "/out/corpus-${h}" \
                  --format text \
                  2>&1 | tee "/out/${h}.log"
              done
            '

      - name: Upload Echidna corpus + log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: echidna-${{ github.sha }}
          path: /tmp/echidna-out/
          retention-days: 90
