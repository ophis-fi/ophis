name: 'Ophis CodeQL config'

paths-ignore:
  # Vendored upstream code — has its own CI in the upstream repo.
  - 'apps/backend/'
  - 'contracts/'
  # Generated / build artifacts.
  - '**/node_modules/'
  - '**/dist/'
  - '**/build/'
  - '**/target/'
  - '**/out/'
  - '**/.next/'
  # Test fixtures + mocks (low signal, high noise).
  - '**/__fixtures__/'
  - '**/__mocks__/'
  - '**/test/fixtures/'
