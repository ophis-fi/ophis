# Ophis — MegaETH mainnet (chain 4326) baseline solver config.
# Pass `weth` directly to bypass the chain-keyed for_chain lookup.
weth = "0x4200000000000000000000000000000000000006"
base-tokens = [
  "0x4200000000000000000000000000000000000006",  # WETH (OP Stack predeploy)
  # USDC removed: 0x0b2C639c... is Optimism's USDC (no contract on MegaETH chain
  # 4326). Re-verify the real USDC address on-chain before re-adding at revival.
]
max-hops = 2
max-partial-attempts = 5
native-token-price-estimation-amount = "1000000000000000"  # 0.001 ETH
