# Prometheus scrape config for Ophis HyperEVM mainnet stack.
#
# All targets live on the docker-compose internal network and resolve by
# service name (Docker's embedded DNS). The Prometheus container scrapes
# them every 15s and ships violations to Alertmanager.
#
# Metrics port map (from apps/backend/crates source):
#   - driver:    port 80   /metrics (same port as the main API)
#   - autopilot: port 9589 /metrics (default_metrics_address)
#   - orderbook: port 9586 /metrics (DEFAULT_METRICS_PORT)
#   - rpc-proxy: port 4000 /metrics (eRPC built-in)
#
# kyberswap-solver does NOT expose Prometheus metrics today (it's a thin
# solver-shim built from the same crate as `baseline`). Its health is
# inferred from container state (docker healthcheck) and from the
# driver's `solutions{solver="kyberswap"}` counter.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    chain: hyperevm
    chain_id: "999"
    env: mainnet
    stack: ophis

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: driver
    static_configs:
      - targets: [driver:80]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: autopilot
    static_configs:
      - targets: [autopilot:9589]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: orderbook
    static_configs:
      - targets: [orderbook:9586]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: rpc-proxy
    static_configs:
      - targets: [rpc-proxy:4000]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
    scrape_interval: 60s
