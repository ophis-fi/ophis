# Ophis HyperEVM mainnet — Prometheus alert rules.
#
# Severities:
#   - critical: page Clement on Telegram immediately. Indicates the chain
#     is not settling, RPC is down, or money/orders are at risk.
#   - warning:  Telegram notify with no auto-page. Indicates degradation
#     trending toward critical.
#
# Naming convention: `OphisHl<Component><Symptom>` so that the metric
# label `alertname` is unambiguous when fanned out across chains
# (OphisHl, OphisOp, OphisMega prefixes — same rule set per chain).

groups:
  - name: ophis-hl-availability
    interval: 30s
    rules:
      - alert: OphisHlAutopilotDown
        expr: up{job="autopilot"} == 0
        for: 5m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL autopilot scrape failing for >5m"
          description: "Prometheus cannot reach autopilot:9589/metrics. Auctions are not running. Check `docker compose ps autopilot` on the Mac mini."

      - alert: OphisHlDriverDown
        expr: up{job="driver"} == 0
        for: 5m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL driver scrape failing for >5m"
          description: "Prometheus cannot reach driver:80/metrics. Solver competition has stopped. Check `docker compose ps driver`."

      - alert: OphisHlOrderbookDown
        expr: up{job="orderbook"} == 0
        for: 5m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL orderbook scrape failing for >5m"
          description: "Prometheus cannot reach orderbook:9586/metrics. New orders may be failing to land. Check `docker compose ps orderbook` and confirm port 8300 accepts connections."

      - alert: OphisHlERPCDown
        expr: up{job="rpc-proxy"} == 0
        for: 3m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL eRPC proxy scrape failing for >3m"
          description: "Prometheus cannot reach rpc-proxy:4000/metrics. All upstream provider routing has stopped — everything downstream will start failing. Restart rpc-proxy container."

  - name: ophis-hl-settlement-health
    interval: 30s
    rules:
      - alert: OphisHlNoSettlements1h
        # IntCounterVec `settlements{solver, result}` is monotonic. We want
        # to alert when `result="success"` hasn't incremented in 1h despite
        # auctions running (so we don't alert on quiet periods with no
        # orders). Detect quiet vs. broken by checking that the auction
        # loop IS ticking — autopilot exposes `auction_preprocessing` as a
        # histogram that increments on every auction.
        expr: |
          increase(settlements{result="success"}[1h]) == 0
          and on() increase(auction_preprocessing_count[1h]) > 0
        for: 5m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL: 0 successful settlements in 1h despite active auctions"
          description: "Auctions are running (auction_preprocessing_count > 0) but no settlement has succeeded in the last hour. Common causes, in order of likelihood: (1) HyperSwap V3 subgraph stale — `curl ${HYPERSWAP_V3_SUBGRAPH_URL} -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ _meta { block { number } hasIndexingErrors } }\"}'` and compare to chain head; (2) solver stuck — check `solutions{result}` breakdown; (3) RPC submission failing — check `mempool_submission{result}` and PurroofGroup status; (4) driver-submitter wallet out of HYPE — `cast balance 0xFB308397267878228f7761311DBD6Bc6FCa1bB5a --rpc-url https://rpc.purroofgroup.com`."

      - alert: OphisHlSettlementFailureRateHigh
        expr: |
          (
            sum(rate(settlements{result!="success"}[15m]))
            /
            sum(rate(settlements[15m]))
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL settlement failure rate > 5% over 15m"
          description: "More than 5% of HL settlement attempts are failing. Most likely causes: pool liquidity collapse, gas-price cap too tight, RPC provider issues. Inspect driver logs for revert reasons."

      - alert: OphisHlMempoolSubmissionFailing
        expr: |
          (
            sum(rate(mempool_submission{result!="success"}[15m]))
            /
            sum(rate(mempool_submission[15m]))
          ) > 0.10
        for: 5m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL: >10% of mempool submissions failing over 15m"
          description: "PurroofGroup mempool submission failing for >10% of attempts. Could be RPC provider degradation, nonce-race regression, or gas-price cap rejection. Trace via `driver::infra::submission` logs."

      - alert: OphisHlSolverDropRateHigh
        expr: |
          (
            sum by (solver) (rate(dropped_solutions[15m]))
            /
            sum by (solver) (rate(solutions[15m]) + rate(dropped_solutions[15m]))
          ) > 0.50
        for: 15m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL {{ $labels.solver }} dropping >50% of solutions over 15m"
          description: "Solver `{{ $labels.solver }}` is dropping more than half its proposed solutions on HL. Likely cause: simulator reverts, slippage clip, settlement-balance issues. Check driver logs for `dropped_solutions{reason}` breakdown."

  - name: ophis-hl-erpc-consensus
    interval: 30s
    rules:
      # Codex Cyber post-merge recommendation (2026-05-18): track consensus
      # error rate after removing `ignoreFields:[timestamp]` (PR #71). Catches
      # any unexpected availability regression on the consensus-protected
      # methods. Split by error type so an operator can distinguish "providers
      # diverging on response value" (dispute) from "providers not responding"
      # (low_participants) at a glance.
      #
      # Source metric: erpc_consensus_errors_total — labels:
      #   - error: dispute | low_participants | consensus_on_error
      #   - category: eth_call | eth_getBlockByNumber | eth_getBlockByHash |
      #               eth_getLogs | eth_getTransactionReceipt | eth_getTransactionByHash
      #   - finality: finalized | unfinalized | realtime | unknown
      #   - network: evm:999
      - alert: OphisHlErpcConsensusLowParticipantsHigh
        expr: |
          sum by (category) (
            rate(erpc_consensus_errors_total{network="evm:999",error="low_participants"}[5m])
          ) > 5
        for: 10m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL eRPC low-participants > 5/s on {{ $labels.category }} for 10m"
          description: |
            eRPC is failing consensus because fewer than 2 of 3 upstreams respond
            within the retry budget for `{{ $labels.category }}` requests. Sustained
            elevation indicates one or more HL upstream(s) (purroof / official /
            hypurrscan) are slow or rate-limited.

            Diagnose: `cast block-number --rpc-url <each upstream>` to find
            which one is unresponsive. Check rpc-proxy logs:
            `docker logs hyperevm-mainnet-rpc-proxy-1 --tail 50 | grep low_participants`

            Threshold history: 5/s ≈ 100% failure on `eth_call` consensus path
            (driver/orderbook poll ~5/s steady state).

      - alert: OphisHlErpcConsensusDisputeHigh
        expr: |
          sum by (category) (
            rate(erpc_consensus_errors_total{network="evm:999",error="dispute"}[5m])
          ) > 2
        for: 10m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL eRPC dispute rate > 2/s on {{ $labels.category }} for 10m"
          description: |
            Upstream HL providers are returning DIFFERENT responses for the same
            request — fork-view-poisoning suspect OR natural tip drift. 2-of-3
            consensus is failing because responses don't match.

            Sustained > 2/s is unusual: it means either (a) one of the 3
            upstreams is on a fork / lagging behind the others, OR (b) a
            specific request pattern is triggering deterministic disagreement
            (e.g., a `latest`-tag query that resolves to different blocks).

            On HL, expect occasional disputes on tip queries (PR #71 trade-off).
            Sustained elevation = investigate which upstream is drifting:
              cast block-number --rpc-url https://rpc.purroofgroup.com
              cast block-number --rpc-url https://rpc.hyperliquid.xyz/evm
              cast block-number --rpc-url https://rpc.hypurrscan.io
            and compare. Provider > 5 blocks behind the median should be
            sit-out-penalized by eRPC's punishMisbehavior — verify.

      - alert: OphisHlErpcConsensusFailureCritical
        expr: |
          (
            sum(rate(erpc_consensus_errors_total{network="evm:999"}[5m]))
            /
            sum(rate(erpc_consensus_total{network="evm:999"}[5m]))
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL eRPC > 50% of consensus calls failing for 5m"
          description: |
            More than half of all consensus operations on the HL eRPC proxy are
            failing. This is a real availability incident — driver / autopilot /
            orderbook will stall, no new settlements can broadcast, in-flight
            settlements will revert.

            Likely cause: 2 of 3 upstream HL providers simultaneously degraded
            (rate-limit, outage, or DNS). PR #71 (timestamp ignore removed) can
            contribute extra disputes but should not push the overall failure
            rate above 50%.

            Immediate actions:
              1. Identify which upstreams are down via direct probe
              2. Consider emergency hot-swap to a known-healthy provider
                 (see project_ophis_roadmap.md section 3 reliability map)
              3. Worst case: temporarily lower agreementThreshold to 1 (NOT
                 audit-compliant — revert as soon as providers recover)

  - name: ophis-hl-latency
    interval: 30s
    rules:
      - alert: OphisHlAuctionLatencyHigh
        expr: |
          histogram_quantile(0.95, rate(auction_preprocessing_bucket[10m])) > 5
        for: 10m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL p95 auction-preprocessing > 5s"
          description: "Auction preprocessing p95 above 5s for 10m. RPC reads (block fetch, balance reads) are slowing the auction loop. Likely RPC provider degradation — inspect eRPC proxy metrics for consensus failures."

      - alert: OphisHlSolveTimeBudgetExhausted
        expr: |
          histogram_quantile(0.99, rate(remaining_solve_time_bucket{kind="dispatched"}[10m])) < 1.0
        for: 10m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL solvers receiving <1s of solve-time budget at p99"
          description: "By the time solvers are dispatched, less than 1s remains on the 20s solve-deadline at p99. Upstream RPC + preprocessing is eating the budget. Solvers will quote stale or skip auctions."

  - name: ophis-hl-chain-health
    interval: 30s
    rules:
      # Audit MEDIUM-9 (2026-05-17): submission-deadline=60 in autopilot.toml
      # was tuned for HL's current ~1s block time. If HL ever bumps to 2s
      # (testnet has done this before) or drops to 500ms (rumored
      # optimization), 60 blocks becomes either too long (stale-quote/MEV
      # window) or too short (mass settle timeouts). Detect block-time
      # drift via the rate of advance of `last_block_number` — the Gauge
      # exported by apps/backend/crates/ethrpc/src/block_stream.rs:329.
      # `rate()` on a monotonic Gauge yields blocks/sec (≈ 1.0 on HL today).
      - alert: OphisHlBlockTimeDrift
        expr: |
          (
            rate(last_block_number{job="autopilot"}[5m]) < 0.75
            or
            rate(last_block_number{job="autopilot"}[5m]) > 1.5
          )
        for: 15m
        labels:
          severity: warning
          chain: hyperevm
        annotations:
          summary: "HL effective block time drifted >25% from assumed 1s"
          description: "HL block production rate is outside the 0.75-1.5 blocks/sec band for 15min. submission-deadline=60 in autopilot.toml is now mistuned (either too long → stale quote / MEV window, or too short → mass settle timeouts). Recompute 60 × actual-block-time and update config."

      # Audit MEDIUM-5 paired alert (2026-05-17): gas-price-cap was raised
      # 10 → 100 gwei. We WANT to alert if HL basefee approaches the new cap
      # (30 gwei ≈ 30% of cap, ~3× steady-state). NOT IMPLEMENTED — Codex
      # Cyber review caught that no `eth_basefee_gwei` metric exists in-tree.
      # Wiring a basefee collector is task #142 (added 2026-05-17). Manual
      # check until then: `cast basefee --rpc-url https://rpc.purroofgroup.com`
      # via a cron probe → Pushgateway, OR add a node_exporter textfile
      # collector. Placeholder removed to avoid false confidence.

  - name: ophis-hl-ethflow
    interval: 30s
    rules:
      # Audit HIGH-2 defense-in-depth (2026-05-18): WHYPE WETH9 parity
      # confirmed empirically (see docs/audits/2026-05-18-whype-weth9-parity.md)
      # — every EthFlow assumption holds today. This alert is the canary for
      # any future divergence: if the EthFlow contract ever emits
      # EthTransferFailed (the explicit revert in _invalidateOrder L243-245
      # when `payable(orderData.owner).call{value: refundAmount}` returns
      # false), something downstream is broken — could be (a) a WHYPE upgrade
      # changing withdraw semantics, (b) a malicious recipient with a
      # gas-heavy fallback, (c) gas-griefing on a contract receiver.
      #
      # The metric expects the event to be exported as a counter — wire via
      # a subgraph alerter, or have the rebate-indexer (which already
      # listens for cow-fi events) tail EthFlow logs.
      # TODO once metric producer lands: re-evaluate threshold.
      - alert: OphisHlEthFlowTransferFailed
        expr: |
          increase(ethflow_eth_transfer_failed_total{chain="hyperevm"}[10m]) > 0
        for: 0m
        labels:
          severity: critical
          chain: hyperevm
        annotations:
          summary: "HL EthFlow refund/transfer failed — investigate WHYPE or recipient state"
          description: "EthFlow at 0xd031Ce1C…b61B emitted EthTransferFailed. Possible causes: (1) WHYPE.withdraw semantics changed; (2) recipient is a contract with a gas-heavy fallback; (3) MEV-grief from a hostile receiver. Check the failing tx hash in driver logs, decode the orderData.owner field, and confirm whether WHYPE codehash changed via `cast keccak (cast code 0x5555…)`. Reference doc: docs/audits/2026-05-18-whype-weth9-parity.md."
