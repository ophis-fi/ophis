# infra/megaeth/docker-compose.testnet.yml — Greg Phase 3 Stage-1 stack
#
# Boots Greg's full backend (orderbook + autopilot + driver + baseline) against
# MegaETH testnet (chainId 6343, RPC https://carrot.megaeth.com/rpc) using
# Greg-deployed contracts:
#   Settlement   = 0x0864b65F1EFe752a699d119Ae0419E7331a8Bfce
#   VaultRelayer = 0x842F655C9310C32e5932A0eBFa80c4Cd358c0205
#   Auth Proxy   = 0x9eFDcC2770Af6837B285702d386D558BD1066BA8
#
# Stage 1 is ABI smoke only — testnet has no DEX with discoverable liquidity,
# so quotes will return NoLiquidity. The point is to verify the stack boots,
# the orderbook indexes the deployed Settlement, and autopilot polls blocks.
# The real first-swap (Phase 3 phase gate) lives on mainnet (chain 4326).
#
# Boot:  docker compose -f infra/megaeth/docker-compose.testnet.yml --env-file infra/megaeth/.env up -d
# Tear:  docker compose -f infra/megaeth/docker-compose.testnet.yml --env-file infra/megaeth/.env down

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: backend-migrations:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: migrations
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://db/${POSTGRES_DB}?user=${POSTGRES_USER}&password=${POSTGRES_PASSWORD}

  orderbook:
    image: local-orderbook:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: orderbook
    restart: always
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_URL: ${DB_READ_URL}
      ETH_RPC_URL: ${MEGAETH_TESTNET_RPC}
    volumes:
      - ./configs/orderbook.toml:/orderbook.toml:ro
    command: ["--config", "/orderbook.toml"]
    ports:
      - "8080:80"

  autopilot:
    image: local-autopilot:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: autopilot
    restart: always
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      orderbook:
        condition: service_started
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_URL: ${DB_READ_URL}
      ETH_RPC_URL: ${MEGAETH_TESTNET_RPC}
    volumes:
      - ./configs/autopilot.toml:/autopilot.toml:ro
    command: ["--config", "/autopilot.toml"]

  driver:
    image: local-driver:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: driver
    restart: always
    depends_on:
      baseline:
        condition: service_started
    environment:
      ETHRPC: ${MEGAETH_TESTNET_RPC}
      ADDR: 0.0.0.0:80
      LOG_FILTER: "info,driver=debug,driver::infra::observe=trace,driver::infra::solver=trace"
    volumes:
      - ./configs/driver.toml:/driver.toml:ro
    command: ["--config", "/driver.toml"]
    ports:
      - "8081:80"

  baseline:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
    restart: always
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./configs/baseline.toml:/baseline.toml:ro
    command: ["baseline", "--config", "/baseline.toml"]
    ports:
      - "9001:80"

volumes:
  postgres:
