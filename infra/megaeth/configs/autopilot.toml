node-url = "https://carrot.megaeth.com/rpc"
simulation-node-url = "https://carrot.megaeth.com/rpc"

# Override every contract address — see same comment in orderbook.toml.
[contracts]
settlement = "0x0864b65F1EFe752a699d119Ae0419E7331a8Bfce"
balances = "0x7c2461066e6af18520384ecfb5afdd7209ea9be7"
signatures = "0xf9cc3c9982d8ad424fa8071f09f3fa3072bc03a1"
native-token = "0x4200000000000000000000000000000000000006"
hooks = "0x0e9ca200bbc926e2023c856841111feed2818b29"
balancer-v2-vault = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"

[logging]
filter = "warn,autopilot=debug,shared=info,price_estimation=info"

[current-block]
poll-interval = "1s"

[run-loop]
solve-deadline = "20s"

[[gas-estimators]]
type = "Web3"

[[gas-estimators]]
type = "Alloy"

[[drivers]]
name = "baseline"
url = "http://driver/baseline"
address = "0xFB308397267878228f7761311DBD6Bc6FCa1bB5a"

[fee-policies]

[database]
write-url = "%DB_WRITE_URL"
read-url = "%DB_READ_URL"

# No ethflow on MegaETH; native-ETH-via-eth-flow is a Phase 3.x follow-up.

[order-quoting]
price-estimation-drivers = [{ name = "baseline", url = "http://driver/baseline" }]

# Same small probe as orderbook — testnet pool has only 0.1 WETH total.
[price-estimation]
amount-to-estimate-prices-with = "1000000000000000"  # 0.001 ETH

[native-price-estimation]
estimators = [[{ type = "Driver", name = "baseline", url = "http://driver/baseline" }]]

[native-price-estimation.cache]
max-age = "20m"
