# Greg-deployed Uniswap V2 fork on testnet. Manual config: no subgraph needed
# since V2 pools are CREATE2-deterministic from (factory, sortedTokens) keyed
# by the canonical Pair init-code hash. Pool-discovery probes the factory
# directly via getPair() once the pair is hot.
[[liquidity.uniswap-v2]]
router = "0x75ded14ecead092aeccdcba693ac4d1b8921b7df"
pool-code = "0x96e8ac4277198ff8b6f785478aa9a39f403cb768dd02cbee326c3e7da348845f"
missing-pool-cache-time = "5m"
