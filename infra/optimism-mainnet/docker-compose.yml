# infra/optimism-mainnet/docker-compose.yml — Ophis Optimism mainnet stack
# (chain 10). Ports shifted +1 from testnet (5435/8102/8103/9022) to coexist
# on the same host.

# Explicit project name (sharp-edges HIGH-3, 2026-05-20). Matches the
# directory-derived default so existing containers / volumes / network
# aren't orphaned by the rename — but the *explicit* name still blocks
# `docker compose -p ophis ...` from accidentally collapsing OP + HL
# stacks into one project (which would silently overwrite TSDB / db
# volumes).
name: optimism-mainnet

# Shared build-args for the Rust backend images (orderbook/autopilot/driver/
# solvers). OPHIS_GIT_DESCRIBE injects the real version into the orderbook
# GET /api/v1/version route; the build context (apps/backend) has no .git, so
# vergen otherwise emits the literal "VERGEN_IDEMPOTENT_OUTPUT" sentinel.
# compose-up.sh exports it from `git describe`. Applied to EVERY Rust service
# so the shared cargo-build stage has one consistent cache key (a differing
# arg between services would force a second full workspace compile).
x-backend-build-args: &backend-build-args
  OPHIS_GIT_DESCRIBE: "${OPHIS_GIT_DESCRIBE:-}"

#
# Secret management:
#   - Addresses come from ../optimism/.env (deployed by deploy-mainnet-all.sh)
#   - Secrets (driver private key, DB password) come from ./.env in this dir
#   - ./.env is gitignored — see ./.env.example for the template
#
# All HTTP/RPC ports bind to 127.0.0.1 only. External access is via
# Cloudflare Tunnel, never direct port exposure.

services:
  # Jaeger all-in-one — OTLP/gRPC collector + UI + in-memory storage in
  # a single distroless image (~120 MB). Phase 4 audit M-6 (Sprint 6).
  #
  # The CoW backend already wires opentelemetry-otlp + tonic gRPC export
  # (apps/backend/crates/observe/src/tracing/init.rs:103-108); all that
  # was missing was a collector. Jaeger 1.6+ ships an embedded OTLP
  # receiver so we don't need a separate otelcol container.
  #
  # Ports:
  #   16686 (host)  → 16686 (container)  Jaeger UI (local-only)
  #   4317  (host)  → 4317  (container)  OTLP/gRPC ingest (loopback)
  # Note: HL's eventual tracing service would use 4318/16687 to coexist.
  #
  # Storage is in-memory (default): traces vanish on restart. Acceptable
  # for current "debug a specific incident" use; if we need long-term
  # trace retention later, swap to badger-backed (~/.local/state/...).
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    restart: always
    mem_limit: 512m
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # UI: http://127.0.0.1:16686
      - "127.0.0.1:4317:4317"    # OTLP/gRPC (used internally by services)
    healthcheck:
      # all-in-one runs /usr/bin/dumb-init then jaeger; ships wget in
      # the image. /health is on port 14269 (admin endpoint, separate
      # from the OTLP receiver).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # eRPC multi-provider proxy for OP mainnet (chain 10). All chain-reading
  # services point ETHRPC at this container instead of hitting any single
  # public RPC directly. Free providers rate-limit or rate-degrade
  # asymmetrically; eRPC fans requests across 3 upstreams with consensus
  # on critical reads (defeats fork-view-poisoning — see
  # configs/erpc.yaml.tmpl for the audit reasoning).
  #
  # Cloned from infra/hyperevm-mainnet (Phase 4 audit M-2, 2026-05-19).
  rpc-proxy:
    image: ghcr.io/erpc/erpc:latest
    restart: always
    mem_limit: 512m
    volumes:
      # Default config path inside the erpc image is /erpc.yaml — mount the
      # rendered config there and let the image's stock entrypoint pick it up
      # (overriding command to pass --config breaks the entrypoint).
      - ./rendered/erpc.yaml:/erpc.yaml:ro
    ports:
      - "127.0.0.1:4001:4000"  # +1 vs HL stack (4000) to coexist on same host
    # eRPC image is distroless — no /bin/sh / wget / curl. The
    # `rpc-proxy-health` sidecar below probes /healthcheck and is what
    # `depends_on: service_healthy` actually targets.

  # 1.4 MB busybox sidecar — only job is to publish "rpc-proxy is answering
  # /healthcheck" as a docker health state. orderbook/autopilot/driver
  # depend_on this so they don't try to talk to eRPC before it's serving
  # (which would log connection-refused errors and trigger retry storms).
  rpc-proxy-health:
    image: busybox:stable-musl
    restart: always
    depends_on:
      rpc-proxy: { condition: service_started }
    command: ["sh", "-c", "while true; do sleep 30; done"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://rpc-proxy:4000/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16
    restart: always
    mem_limit: 2g
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: backend-migrations:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: migrations
    restart: on-failure
    depends_on:
      db: { condition: service_healthy }
    environment:
      FLYWAY_URL: jdbc:postgresql://db/${POSTGRES_DB}?user=${POSTGRES_USER}&password=${POSTGRES_PASSWORD}

  orderbook:
    image: local-orderbook:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: orderbook
      args: *backend-build-args
    restart: always
    mem_limit: 2g
    depends_on:
      db: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }
      # Wait for eRPC to actually be answering before booting — without this
      # orderbook hits connection-refused on its first eth_chainId probe and
      # panics at startup, then restart-loops until eRPC is up (matches
      # systemic bootstrap-RPC pathology fix from PRs #88-#97).
      rpc-proxy-health: { condition: service_healthy }
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_URL: ${DB_READ_URL}
      # eRPC proxy (Phase 4 audit M-2). Override via OP_RPC_INTERNAL in .env
      # for local dev / failure-domain tests (e.g. point at a single upstream
      # to validate consensus behavior).
      ETH_RPC_URL: ${OP_RPC_INTERNAL:-http://rpc-proxy:4000/main/evm/10}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:?coingecko key must be set in infra/optimism-mainnet/.env}
      # Distributed tracing (Phase 4 audit M-6). Empty default keeps tracing
      # off; set TRACING_COLLECTOR_ENDPOINT=http://jaeger:4317 in .env to
      # enable. Routed via OTLP/gRPC.
      TRACING_COLLECTOR_ENDPOINT: ${TRACING_COLLECTOR_ENDPOINT:-}
      # F7 inter-service auth (#443): the orderbook signs its driver /quote
      # calls with this Bearer token (price-estimation ExternalTradeFinder).
      # Empty default = no header (un-authenticated) so this is a SAFE no-op
      # until the driver enforces — the enforcement flip is a separate, windowed
      # step. compose-up.sh sources the value from the macOS Keychain entry
      # `ophis-inter-service-auth-token`; all three services (orderbook, driver,
      # autopilot) must carry the SAME value (constant-time compare = exact).
      OPHIS_INTER_SERVICE_AUTH_TOKEN: ${OPHIS_INTER_SERVICE_AUTH_TOKEN:-}
    volumes:
      - ./configs/orderbook.toml:/orderbook.toml:ro
    command: ["--config", "/orderbook.toml"]
    ports:
      - "127.0.0.1:8102:80"
    healthcheck:
      # CoW backend images are distroless-ish; no curl/wget. Bash /dev/tcp
      # confirms port 80 is accepting TCP connections — enough to know the
      # HTTP server is up. Liveness from inside the orderbook process is not
      # exposed; if a deadlock kept the listener up but the worker stuck,
      # this wouldn't catch it. Use Prometheus metrics for that (Spec TBD).
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  autopilot:
    image: local-autopilot:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: autopilot
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    depends_on:
      db: { condition: service_healthy }
      migrations: { condition: service_completed_successfully }
      orderbook: { condition: service_healthy }
      rpc-proxy-health: { condition: service_healthy }
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_URL: ${DB_READ_URL}
      # eRPC proxy (Phase 4 audit M-2). Override via OP_RPC_INTERNAL in .env
      # for local dev / failure-domain tests (e.g. point at a single upstream
      # to validate consensus behavior).
      ETH_RPC_URL: ${OP_RPC_INTERNAL:-http://rpc-proxy:4000/main/evm/10}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:?coingecko key must be set in infra/optimism-mainnet/.env}
      # Distributed tracing (Phase 4 audit M-6). Empty default keeps tracing
      # off; set TRACING_COLLECTOR_ENDPOINT=http://jaeger:4317 in .env to
      # enable. Routed via OTLP/gRPC.
      TRACING_COLLECTOR_ENDPOINT: ${TRACING_COLLECTOR_ENDPOINT:-}
      # F7 (2026-05-21 whole-repo audit, HIGH H2): inter-service auth on
      # driver /solve /reveal /settle /quote routes. When set, autopilot
      # injects Authorization: Bearer <token> on outgoing requests. When
      # unset, no header is sent — preserves pre-F7 behavior. Driver
      # MUST be configured with the SAME token via its own env. Generate
      # via `openssl rand -hex 32` and store in macOS Keychain
      # (service=ophis-inter-service-auth-token, account=$USER).
      OPHIS_INTER_SERVICE_AUTH_TOKEN: ${OPHIS_INTER_SERVICE_AUTH_TOKEN:-}
    volumes:
      - ./configs/autopilot.toml:/autopilot.toml:ro
    command: ["--config", "/autopilot.toml"]
    # autopilot is a worker (no HTTP listener), so only restart-on-failure
    # via Docker's `restart: always` policy. Health is signalled via the
    # Prometheus /metrics endpoint that the binary always exposes.

  driver:
    image: local-driver:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: driver
      args: *backend-build-args
    restart: always
    mem_limit: 2g
    depends_on:
      baseline: { condition: service_healthy }
      okx-solver: { condition: service_healthy }
      kyberswap-solver: { condition: service_healthy }
      velora-solver: { condition: service_healthy }
      rpc-proxy-health: { condition: service_healthy }
    environment:
      # Driver uses eRPC proxy for block-stream polling + eth_call workload.
      # Transaction submission still routes directly to the chosen mempool
      # via the [[submission.mempool]] block in driver.toml — that path
      # needs a single nonce-coherent endpoint, not a load-balanced fan-out.
      ETHRPC: ${OP_RPC_INTERNAL:-http://rpc-proxy:4000/main/evm/10}
      ADDR: 0.0.0.0:80
      # Distributed tracing (Phase 4 audit M-6). See orderbook block.
      TRACING_COLLECTOR_ENDPOINT: ${TRACING_COLLECTOR_ENDPOINT:-}
      # F7 (2026-05-21 whole-repo audit, HIGH H2): inter-service auth.
      # When set, driver enforces Authorization: Bearer <token> on all
      # per-solver routes. Autopilot MUST use the SAME token to make
      # successful requests. See autopilot block above for setup.
      OPHIS_INTER_SERVICE_AUTH_TOKEN: ${OPHIS_INTER_SERVICE_AUTH_TOKEN:-}
      LOG_FILTER: "info,driver=info,driver::infra::observe=info"
      # Tier 1 PK isolation (2026-05-18): PK *source* is now
      # /Users/ophis-driver/.config/submitter.key (read at render time via sudo).
      # The rendered driver.toml stays here in ./rendered/ because colima's
      # virtiofs runs the host-side daemon as scep and can't access paths
      # outside scep's perm scope — so any bind-mount source MUST be
      # scep-readable. Stricter isolation requires Tier 2 (AWS KMS).
    volumes:
      - ./rendered/driver.toml:/driver.toml:ro
    command: ["--config", "/driver.toml"]
    ports:
      - "127.0.0.1:8103:80"
    # Phase 4 audit M-5 (2026-05-19): real /healthz probe instead of bare
    # TCP-port check. The driver has a real /healthz endpoint
    # (apps/backend/crates/driver/src/infra/api/routes/healthz.rs) that
    # returns 200 + `{ok:true}` when min-balance is met and submitters
    # are responsive, OR 503 otherwise. Probing it catches the deadlock
    # case where the listener is up but no work is being done — the
    # /dev/tcp check would say "healthy" indefinitely in that mode.
    #
    # No curl/wget in the distroless-ish image, so the probe is
    # hand-crafted HTTP/1.0 via bash's /dev/tcp. Greps the response line
    # for "200" — accepts only 200 OK as healthy. Anything else (503,
    # connection refused, timeout) is unhealthy.
    # 2026-05-20 fix: was running in /bin/sh (dash) which DOESN'T support
    # /dev/tcp/ (it's a bash builtin). Dash treated `/dev/tcp/127.0.0.1/80`
    # as a literal filesystem path → "Directory nonexistent" → exit 2 →
    # docker marked driver unhealthy even though the actual /healthz
    # endpoint returns 200. Wrap explicitly in bash -c so the magic-path
    # is interpreted correctly. The CoW backend image ships bash (verified
    # by other healthchecks in this file that use bash -c successfully).
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          bash -c '
            exec 3<>/dev/tcp/127.0.0.1/80 || exit 1
            printf "GET /healthz HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3
            head -n 1 <&3 | grep -q " 200 "
          '
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  baseline:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./configs/baseline.toml:/baseline.toml:ro
    command: ["baseline", "--config", "/baseline.toml"]
    ports:
      - "127.0.0.1:9022:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # OKX OnchainOS aggregator solver. Reads its API credentials from the
  # rendered TOML at rendered/okx.toml (gitignored; produced by
  # ./render-configs.sh which envsubst's configs/okx.toml.tmpl with .env).
  # MUST run ./render-configs.sh before `docker compose up` so rendered/okx.toml
  # exists with secrets substituted.
  okx-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/okx.toml:/okx.toml:ro
    command: ["okx", "--config", "/okx.toml"]
    ports:
      - "127.0.0.1:9023:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # KyberSwap aggregator solver — second competing solver in the auction.
  # Free public API, no key required; configs/kyberswap.toml is checked-in
  # as-is (no template rendering needed).
  kyberswap-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./configs/kyberswap.toml:/kyberswap.toml:ro
    command: ["kyberswap", "--config", "/kyberswap.toml"]
    ports:
      - "127.0.0.1:9024:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Velora (formerly ParaSwap) aggregator solver — third competing solver.
  # Task #121, 2026-05-16. Augustus V6.2 router on OP:
  # 0x6a000f20005980200259b80c5102003040001068 (allowlisted in
  # dex::velora::VELORA_ROUTER_ALLOWLIST). Free public tier; partner-id
  # "ophis" routes our volume against any future Pro API key.
  velora-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./configs/velora.toml:/velora.toml:ro
    command: ["velora", "--config", "/velora.toml"]
    ports:
      - "127.0.0.1:9025:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  odos-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/odos.toml:/odos.toml:ro
    command: ["odos", "--config", "/odos.toml"]
    ports:
      - "127.0.0.1:9026:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  enso-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/enso.toml:/enso.toml:ro
    command: ["enso", "--config", "/enso.toml"]
    ports:
      - "127.0.0.1:9027:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  lifi-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/lifi.toml:/lifi.toml:ro
    command: ["lifi", "--config", "/lifi.toml"]
    ports:
      - "127.0.0.1:9028:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  openocean-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/openocean.toml:/openocean.toml:ro
    command: ["openocean", "--config", "/openocean.toml"]
    ports:
      - "127.0.0.1:9029:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  dodo-solver:
    image: local-baseline:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: solvers
      args: *backend-build-args
    restart: always
    mem_limit: 1g
    environment:
      ADDR: 0.0.0.0:80
    volumes:
      - ./rendered/dodo.toml:/dodo.toml:ro
    command: ["dodo", "--config", "/dodo.toml"]
    ports:
      - "127.0.0.1:9030:80"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Prometheus — scrape orderbook/driver/autopilot/rpc-proxy /metrics
  # endpoints and evaluate alert rules. Host port 9091 (HL stack uses 9090
  # to allow coexistence even though HL is paused).
  #
  # Sharp-edges HIGH-2 fix: gated behind `observability` compose profile.
  # If TELEGRAM_BOT_TOKEN is unset in .env, render-configs.sh skips the
  # alertmanager.yml render → bringing prometheus + alertmanager up would
  # error on the missing bind-mount source. Profile gating makes this
  # explicit: operator must set the token AND run `COMPOSE_PROFILES=observability
  # docker compose up` (handled by compose-up.sh wrapper) to enable
  # the alerts stack.
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.0.1
    restart: always
    mem_limit: 512m
    user: "nobody"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=0.0.0.0:9090"
      # Restrict UI to read-only — no /reload, no /quit. Re-render via
      # `docker compose restart prometheus`, never via HTTP.
      - "--no-web.enable-lifecycle"
    ports:
      - "127.0.0.1:9091:9090"  # +1 vs HL stack
    # Sharp-edges HIGH-1 fix: depends_on relaxed to `service_started`
    # (not _healthy) so the observability stack comes up even when the
    # driver / orderbook are unhealthy — that's *exactly* when alerts
    # are most needed. Prometheus tolerates targets being down (the
    # `up{job=}` metric is literally how the down-alerts work).
    depends_on:
      driver: { condition: service_started }
      autopilot: { condition: service_started }
      orderbook: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Alertmanager — route Prometheus alerts to Telegram. The rendered
  # alertmanager.yml + chmod-600 telegram-token file are produced by
  # render-configs.sh. Host port 9094 (HL stack uses 9093). Profile-
  # gated like prometheus (sharp-edges HIGH-2).
  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.27.0
    restart: always
    mem_limit: 128m
    user: "nobody"
    volumes:
      - ./observability-rendered/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./observability-rendered/telegram-token:/etc/alertmanager/telegram-token:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"
    ports:
      - "127.0.0.1:9094:9093"  # +1 vs HL stack
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # node-exporter exposes the Colima VM host metrics (filesystem, memory) so
  # Prometheus can alert on DISK EXHAUSTION. The 2026-06-15 outage: the VM disk
  # /dev/vdb1 (/var/lib/docker = Postgres data + container logs) filled to 100%
  # and wedged Postgres in an ENOSPC crash-loop, invisible to the app-level up{}
  # alerts. Reads the VM /proc + /sys + rootfs read-only. Profile-gated like
  # prometheus. The disk alert filters fstype="ext4" so the virtiofs Mac-host
  # share at /Users/scep is ignored. No shell in the scratch image, so liveness
  # is the prometheus up{job="node-exporter"} metric (see OphisOpNodeExporterDown).
  node-exporter:
    profiles: ["observability"]
    image: prom/node-exporter:v1.8.2
    restart: always
    mem_limit: 128m
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host"
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/host:ro,rslave"

  # Auto-refunder for expired eth-flow (native-ETH) orders. Ophis self-hosts the
  # OP stack, so unlike CoW's hosted deployment there is NO managed refunder:
  # without this, an expired native-ETH order strands the user's ETH in the
  # eth-flow contract until a manual invalidateOrder. This worker scans the
  # orderbook DB for expired, unfilled, unrefunded eth-flow orders and batch
  # invalidates them on-chain, returning the ETH to each order owner.
  #
  # MIN_PRICE_DEVIATION_BPS is NEGATIVE so EVERY expired order is refunded: an
  # expired order can never fill, so refunding is always correct. CoW's default
  # (190 = only >=1.9% slippage) skips normal tight-slippage orders. Gas is paid
  # from a dedicated low-value EOA (keychain ophis-refunder-pk), NOT the
  # settlement submitter, to avoid nonce contention. See docs runbook.
  refunder:
    image: local-refunder:latest
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: refunder
      args: *backend-build-args
    restart: always
    mem_limit: 512m
    depends_on:
      db: { condition: service_healthy }
      orderbook: { condition: service_healthy }
      rpc-proxy-health: { condition: service_healthy }
    environment:
      DB_URL: ${DB_READ_URL}
      NODE_URL: ${OP_RPC_INTERNAL:-http://rpc-proxy:4000/main/evm/10}
      CHAIN_ID: "10"
      ETHFLOW_CONTRACTS: "0x764fE4aa1FF493cf39931c7923C8ff5837596504"
      REFUNDER_PK: ${OPHIS_REFUNDER_PK:?refunder key must be set (keychain ophis-refunder-pk; export before compose up)}
      # Negative -> refund every expired order (an expired order can never fill).
      MIN_PRICE_DEVIATION_BPS: "-1000000"
      MIN_VALIDITY_DURATION: "2m"
      LOOKBACK_TIME: "30d"

volumes:
  postgres:
  prometheus-data:
  alertmanager-data:
