# Ophis — Optimism mainnet (chain 10) orderbook config.
eip1271-skip-creation-validation = true
bind-address = "0.0.0.0:80"

[shared]
node-url = "https://optimism-rpc.publicnode.com"
simulation-node-url = "https://optimism-rpc.publicnode.com"

# Override every contract address — Optimism mainnet (chain 10) needs explicit
# Ophis-deployed addresses since upstream's contracts registry doesn't include
# our deployments here. From deploy-mainnet-all.sh on 2026-05-13.
[shared.contracts]
settlement = "0x310784c7FCE12d578dA6f53460777bAc9718B859"
balances = "0x78799f98276efba1edeed32eae03a3fd8cdfec3a"
signatures = "0x5f315a204e7971fc29a66fef3a5773f6b0202fac"
native-token = "0x4200000000000000000000000000000000000006"
hooks = "0x2fbb1e41ff4f9b707e4428eec7f5afaac5d60810"
# Balancer V2 Vault: canonical cross-chain address used as a flash-loan source
# for solver simulation. The Vault is deployed on OP at the same address.
balancer-v2-vault = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"

[database]
write-url = "%DB_WRITE_URL"
read-url = "%DB_READ_URL"

[native-price-estimation]
# Primary estimator: on-chain Uniswap V3 TWAP. Reads a 180-second TWAP
# from the deepest WETH/<token> pool across fee tiers [500, 3000, 100,
# 10000] via `IUniswapV3Pool.observe`. Deterministic, no API key, no
# off-chain dependency. Replaces CoinGecko as the default — task #94.
#
# Fallback: CoinGecko Demo tier. Kicks in only when no V3 pool meets
# the liquidity threshold on any fee tier (long-tail tokens without
# direct WETH pairs, brand-new listings). Same config as before lives
# under [price-estimation.coin-gecko] so we can drop back if the
# on-chain reader misbehaves in production.
#
# factory + init-code-hash are canonical Uniswap V3 (same address on
# Ethereum / Optimism / Arbitrum / Polygon / Base / BNB — pools have
# no constructor args so the init hash is constant across chains).
# Sources:
# https://developers.uniswap.org/contracts/v3/reference/deployments/optimism-deployments
# https://github.com/Uniswap/v3-periphery/blob/main/contracts/libraries/PoolAddress.sol
estimators = [
  [
    { type = "UniswapV3", factory = "0x1F98431c8aD98523631AE4a59f267346ea31F984", init-code-hash = "0xe34f199b19b2b4f47f68442619d555527d244f78a3297ea89325f843f87b8b54" },
    { type = "CoinGecko" },
  ],
]

[order-quoting]
# Same fanout for quote estimation. Without OKX/KyberSwap here, a swap
# of WETH/USDC returns "NoLiquidity" because baseline can only route
# through SushiSwap V2 which has minimal liquidity on OP.
price-estimation-drivers = [
  { name = "baseline", url = "http://driver/baseline" },
  { name = "okx", url = "http://driver/okx" },
  { name = "kyberswap", url = "http://driver/kyberswap" },
  { name = "velora", url = "http://driver/velora" },
]

[price-estimation]
amount-to-estimate-prices-with = "1000000000000000"  # 0.001 ETH

# CoinGecko config. The coin-gecko sub-block belongs under [price-estimation],
# not [native-price-estimation], even though only the native estimator uses it.
[price-estimation.coin-gecko]
# CoinGecko Demo-tier key (free, signup at coingecko.com/api/pricing).
# Read from container env via CoW's %VAR_NAME interpolation. The COW
# code was patched to use x-cg-demo-api-key header for Demo keys (see
# coingecko.rs constant AUTHORIZATION).
api-key = "%COINGECKO_API_KEY"
url = "https://api.coingecko.com/api/v3/simple/token_price"
