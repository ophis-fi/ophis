# Ophis — Optimism mainnet (chain 10) autopilot config.
node-url = "https://optimism-rpc.publicnode.com"
simulation-node-url = "https://optimism-rpc.publicnode.com"

# Per-order wait while the run loop fetches a missing native (ETH-
# denominated) token price. Defaults to 0ns, which makes the auction
# filter any order whose token prices aren't already cached. The
# CoinGecko simple/token_price endpoint typically answers in 200-500ms
# so 5s is generous and covers a cold cache after restart.
native-price-timeout = "5s"

[contracts]
settlement = "0x310784c7FCE12d578dA6f53460777bAc9718B859"
balances = "0x78799f98276efba1edeed32eae03a3fd8cdfec3a"
signatures = "0x5f315a204e7971fc29a66fef3a5773f6b0202fac"
native-token = "0x4200000000000000000000000000000000000006"
hooks = "0x2fbb1e41ff4f9b707e4428eec7f5afaac5d60810"
balancer-v2-vault = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"

[logging]
filter = "warn,autopilot=debug,shared=info,price_estimation=info"

[current-block]
poll-interval = "2s"  # OP block time

[run-loop]
solve-deadline = "20s"

[[gas-estimators]]
type = "Web3"

[[gas-estimators]]
type = "Alloy"

[[drivers]]
name = "baseline"
url = "http://driver/baseline"
address = "0xFB308397267878228f7761311DBD6Bc6FCa1bB5a"

# OKX V6 aggregator — paid API, exactIn-only. Wins most swaps where
# baseline (Sushi V2 only) has thin liquidity on OP.
[[drivers]]
name = "okx"
url = "http://driver/okx"
address = "0xFB308397267878228f7761311DBD6Bc6FCa1bB5a"

# KyberSwap free aggregator — exactIn-only. Frequent fallback when OKX
# can't route a path; together they cover essentially all production
# token pairs on OP.
[[drivers]]
name = "kyberswap"
url = "http://driver/kyberswap"
address = "0xFB308397267878228f7761311DBD6Bc6FCa1bB5a"

[fee-policies]

[database]
write-url = "%DB_WRITE_URL"
read-url = "%DB_READ_URL"

[order-quoting]
price-estimation-drivers = [
  { name = "baseline", url = "http://driver/baseline" },
  { name = "okx", url = "http://driver/okx" },
  { name = "kyberswap", url = "http://driver/kyberswap" },
]

[price-estimation]
amount-to-estimate-prices-with = "1000000000000000"

[price-estimation.coin-gecko]
api-key = "%COINGECKO_API_KEY"
url = "https://api.coingecko.com/api/v3/simple/token_price"

[native-price-estimation]
estimators = [[{ type = "CoinGecko" }]]

[native-price-estimation.cache]
max-age = "20m"
