# Ophis — Optimism mainnet (chain 10) autopilot config.
node-url = "http://rpc-proxy:4000/main/evm/10"
simulation-node-url = "http://rpc-proxy:4000/main/evm/10"

# Per-order wait while the run loop fetches a missing native (ETH-
# denominated) token price. Defaults to 0ns, which makes the auction
# filter any order whose token prices aren't already cached. The
# CoinGecko simple/token_price endpoint typically answers in 200-500ms
# so 5s is generous and covers a cold cache after restart.
native-price-timeout = "5s"

[contracts]
settlement = "0x310784c7FCE12d578dA6f53460777bAc9718B859"
balances = "0x78799f98276efba1edeed32eae03a3fd8cdfec3a"
signatures = "0x5f315a204e7971fc29a66fef3a5773f6b0202fac"
native-token = "0x4200000000000000000000000000000000000006"
hooks = "0x2fbb1e41ff4f9b707e4428eec7f5afaac5d60810"
balancer-v2-vault = "0xBA12222222228d8Ba445958a75a0704d566BF2C8"

# EthFlow: native-ETH sells. CoWSwapEthFlow deployed on OP 2026-06-07
# (tx 0xc0316c2c627d3af942049ae90045d6b78eaf70a64a7ff52c4da649a96097c48e),
# constructor-wired to this settlement (0x310784c7) + WETH (0x4200), WETH
# allowance to vaultRelayer (0x83847EaB) = MAX. The autopilot indexes
# on-chain eth-flow OrderPlacement/Refund events from this contract so they
# enter the auction and settle. `indexing-start` is the deploy BLOCK number
# (find_indexing_start_block treats it as BlockNumberOrTag::Number).
[ethflow]
contracts = ["0x764fE4aa1FF493cf39931c7923C8ff5837596504"]
indexing-start = 152628084

[logging]
filter = "warn,autopilot=debug,shared=info,price_estimation=info"

[current-block]
poll-interval = "2s"  # OP block time

[run-loop]
solve-deadline = "20s"

[[gas-estimators]]
type = "Web3"

[[gas-estimators]]
type = "Alloy"

[[drivers]]
name = "baseline"
url = "http://driver/baseline"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

# OKX V6 aggregator — paid API, exactIn-only. Wins most swaps where
# baseline (Sushi V2 only) has thin liquidity on OP.
[[drivers]]
name = "okx"
url = "http://driver/okx"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

# KyberSwap free aggregator — exactIn-only. Frequent fallback when OKX
# can't route a path; together they cover essentially all production
# token pairs on OP.
[[drivers]]
name = "kyberswap"
url = "http://driver/kyberswap"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

# Velora (formerly ParaSwap) — third aggregator, exactIn-only. Adds
# independent DEX coverage + routing-algorithm diversity (MPA vs.
# Kyber MDP vs. OKX). 3 aggregators competing per batch produces
# genuine surplus.
[[drivers]]
name = "velora"
url = "http://driver/velora"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[[drivers]]
name = "odos"
url = "http://driver/odos"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[[drivers]]
name = "enso"
url = "http://driver/enso"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[[drivers]]
name = "lifi"
url = "http://driver/lifi"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[[drivers]]
name = "openocean"
url = "http://driver/openocean"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[[drivers]]
name = "dodo"
url = "http://driver/dodo"
address = "0x92B9bE5e96795E8630fDC61efb0e705E75b1A1B1"

[fee-policies]

[database]
write-url = "%DB_WRITE_URL"
read-url = "%DB_READ_URL"

[order-quoting]
price-estimation-drivers = [
  { name = "baseline", url = "http://driver/baseline" },
  { name = "okx", url = "http://driver/okx" },
  { name = "kyberswap", url = "http://driver/kyberswap" },
  { name = "velora", url = "http://driver/velora" },
  { name = "odos", url = "http://driver/odos" },
  { name = "enso", url = "http://driver/enso" },
  { name = "lifi", url = "http://driver/lifi" },
  { name = "openocean", url = "http://driver/openocean" },
  { name = "dodo", url = "http://driver/dodo" },
]

[price-estimation]
amount-to-estimate-prices-with = "1000000000000000"

[price-estimation.coin-gecko]
api-key = "%COINGECKO_API_KEY"
url = "https://api.coingecko.com/api/v3/simple/token_price"

[native-price-estimation]
# On-chain Uniswap V3 TWAP first, CoinGecko fallback. See orderbook.toml
# for the long-form rationale. Both estimators sit in the same stage so
# they race in parallel and the autopilot keeps whichever returns first
# (with `early_return = 1` from the price-estimation pipeline). In
# practice the V3 read finishes in one RPC round-trip — much faster
# than CoinGecko's REST call — so this is effectively "V3 first,
# CoinGecko fills the long-tail".
estimators = [
  [
    { type = "UniswapV3", factory = "0x1F98431c8aD98523631AE4a59f267346ea31F984", init-code-hash = "0xe34f199b19b2b4f47f68442619d555527d244f78a3297ea89325f843f87b8b54" },
    { type = "CoinGecko" },
  ],
]

[native-price-estimation.cache]
max-age = "20m"
