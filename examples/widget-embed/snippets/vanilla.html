<!doctype html>
<!--
  Vanilla JS embed — full-featured, no framework. Uses @cowprotocol/widget-lib
  to build the iframe, inject the Ophis config, and open the postMessage channel.
  Open this file over http(s) (e.g. `npx serve .`), not file://, so the ESM
  import resolves.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ophis swap (vanilla)</title>
  </head>
  <body>
    <div id="ophis-widget"></div>

    <script type="module">
      import { createCowSwapWidget } from 'https://esm.sh/@cowprotocol/widget-lib@4.2.0'

      // The Ophis Safe — the canonical partner-fee recipient. On Optimism the
      // backend enforces an allowlist, so do not change this if you want orders
      // to settle there.
      const OPHIS_PARTNER_FEE_RECIPIENT = '0x858f0F5eE954846D47155F5203c04aF1819eCeF8'

      const handler = createCowSwapWidget(document.getElementById('ophis-widget'), {
        params: {
          baseUrl: 'https://swap.ophis.fi', // the Ophis host (NOT swap.cow.fi)
          appCode: 'MyDapp-via-Ophis',      // tags your volume in order appData
          partnerFee: { bps: 10, recipient: OPHIS_PARTNER_FEE_RECIPIENT },
          tradeType: 'swap',
          sell: { asset: 'ETH' },
          buy: { asset: 'USDC' },
          width: '450px',
          height: '640px',
          theme: 'dark',
        },
        // Optional: pass an EIP-1193 provider to connect the user's wallet
        // from your app instead of inside the widget:
        // provider: window.ethereum,
      })

      // Optional: react to widget events.
      handler.updateListeners?.([
        { event: 'onTradeParamsChange', handler: (p) => console.log('params', p) },
      ])
    </script>
  </body>
</html>
