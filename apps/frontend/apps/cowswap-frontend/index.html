<!doctype html>

<html lang="en">
  <head>
    <title>Greg</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Greg — intent-based DEX aggregator. DCA, TWAP, and MEV-protected swaps for power-user retail and DAO treasuries."
    />
    <script src="/emergency.js"></script>

    <!-- Manifest, theme & colors  -->
    <link rel="apple-touch-icon" sizes="180x180" href="/greg-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/greg-icon.svg" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="mask-icon" href="/greg-icon.svg" color="#E66A55" />
    <meta name="msapplication-TileColor" content="#E66A55" />
    <meta name="theme-color" content="#E66A55" />

    <!-- Greg fonts: Fraunces (display), Plus Jakarta Sans (body), JetBrains Mono (data). All OFL. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..800,0..100&family=Plus+Jakarta+Sans:wght@300..800&family=JetBrains+Mono:wght@300..800&display=swap"
    />
    <!-- Inter retained for legacy components that reference it directly. -->
    <link rel="preload" href="/static/Inter-roman.var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/Inter-italic.var.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Social media tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Greg — intent-based DEX aggregator" />
    <meta
      property="og:description"
      content="DCA, TWAP, and MEV-protected swaps. Built on CoW Protocol, run by Greg."
    />
    <meta property="og:image" content="/greg-icon.svg" />
    <meta property="og:url" content="https://greg-etm.pages.dev" />

    <!-- Twitter media tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Greg — intent-based DEX aggregator" />
    <meta name="twitter:image" content="/greg-icon.svg" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <noscript>
      <style>
        main {
          margin: 0 auto;
          max-width: 640px;
          padding: 48px 24px;
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .banner {
          padding: 16px;
          background: #FFF3EE;
          border: 1px solid #FFBDA8;
          border-radius: 16px;
          color: #2A0B07;
        }
      </style>
      <main>
        <h1>Greg requires JavaScript</h1>
        <p class="banner">
          Greg is a single-page application. Please
          <a href="https://support.google.com/adsense/answer/12654?hl=en" target="_blank" rel="noopener noreferrer"
            >enable JavaScript</a
          >
          to continue.
        </p>
      </main>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
