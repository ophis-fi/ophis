<!doctype html>

<html lang="en">
  <head>
    <title>Ophis</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Ophis — intent-based DEX aggregator. Tell us what to swap in plain English; we'll route you to a pre-filled, MEV-protected swap."
    />
    <script src="/emergency.js"></script>

    <!-- Manifest, theme & colors  -->
    <link rel="apple-touch-icon" sizes="180x180" href="/ophis-mark-app-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/ophis-icon.svg" />
    <link rel="alternate icon" type="image/svg+xml" href="/ophis-icon-inverse.svg" media="(prefers-color-scheme: dark)" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="mask-icon" href="/ophis-icon.svg" color="#F2A63E" />
    <meta name="msapplication-TileColor" content="#02000d" />
    <meta name="theme-color" content="#02000d" />

    <!-- Ophis fonts: Fraunces (display), Plus Jakarta Sans (body), JetBrains Mono (data). All OFL. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..800,0..100&family=Plus+Jakarta+Sans:wght@300..800&family=JetBrains+Mono:wght@300..800&display=swap"
    />
    <!-- Inter retained for legacy components that reference it directly. -->
    <link rel="preload" href="/static/Inter-roman.var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/Inter-italic.var.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Social media tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ophis — intent-based DEX aggregator" />
    <meta
      property="og:description"
      content="Tell Ophis what to swap in plain English. We pre-fill the form and you sign. Intent-based, MEV-protected."
    />
    <meta property="og:image" content="/ophis-og.jpg" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="Ophis — cosmic gradient hero" />
    <meta property="og:url" content="https://ophis.fi" />
    <meta property="og:site_name" content="Ophis" />

    <!-- Twitter media tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ophis — intent-based DEX aggregator" />
    <meta name="twitter:description" content="Tell Ophis what to swap in plain English. We pre-fill the form and you sign. Intent-based, MEV-protected." />
    <meta name="twitter:image" content="/ophis-og.jpg" />
    <meta name="twitter:image:alt" content="Ophis — cosmic gradient hero" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #02000d;
        color: #f5efe6;
      }
    </style>
  </head>

  <body>
    <noscript>
      <style>
        main {
          margin: 0 auto;
          max-width: 640px;
          padding: 48px 24px;
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          color: #f5efe6;
        }
        .banner {
          padding: 16px;
          background: rgba(245, 239, 230, 0.06);
          border: 1px solid rgba(242, 166, 62, 0.45);
          border-radius: 16px;
          color: #f5efe6;
        }
        a {
          color: #f2a63e;
        }
      </style>
      <main>
        <h1>Ophis requires JavaScript</h1>
        <p class="banner">
          Ophis is a single-page application. Please
          <a href="https://support.google.com/adsense/answer/12654?hl=en" target="_blank" rel="noopener noreferrer"
            >enable JavaScript</a
          >
          to continue.
        </p>
      </main>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
