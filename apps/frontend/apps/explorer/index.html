<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Ophis Explorer</title>
  <meta name="description" content="Ophis Explorer is a blockchain explorer for Ophis, the intent-based DEX aggregator." />
  <base href="/" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />

  <!-- Manifest, theme & colors  -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/favicon-light-mode.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="/favicon-dark-mode.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="/favicon-light-mode.png" media="(prefers-color-scheme: no-preference)" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000" />
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Social media tags -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ophis Explorer" />
  <meta property="og:description" content="Ophis Explorer is a blockchain explorer for Ophis, the intent-based DEX aggregator." />

  <meta property="og:image" content="https://ophis.fi/og-image.png" />
  <meta property="og:image:alt" content="Ophis Explorer: orders, trades, settlement batches, and solver competition." />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://explorer.ophis.fi/" />
  <meta property="og:site_name" content="Ophis" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter media tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@ophisfi" />
  <meta name="twitter:title" content="Ophis Explorer" />
  <meta name="twitter:description" content="Browse orders, trades, settlement batches, and solver competition for Ophis, the intent-based DEX aggregator." />
  <meta name="twitter:image" content="https://ophis.fi/og-image.png" />

  <!-- Structured data: static in the shell so crawlers see it without
       executing the SPA. application/ld+json is a data block, not subject to
       CSP script-src. -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://ophis.fi/#organization",
          "name": "Ophis",
          "url": "https://ophis.fi",
          "logo": "https://explorer.ophis.fi/android-chrome-512x512.png",
          "sameAs": ["https://github.com/ophis-fi/ophis", "https://x.com/ophisfi"]
        },
        {
          "@type": "WebApplication",
          "@id": "https://explorer.ophis.fi/#webapp",
          "name": "Ophis Explorer",
          "url": "https://explorer.ophis.fi/",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "description": "Blockchain explorer for Ophis, the intent-based DEX aggregator. Browse orders, trades, settlement batches, and solver competition on Optimism.",
          "isPartOf": { "@id": "https://ophis.fi/#organization" }
        },
        {
          "@type": "FAQPage",
          "@id": "https://explorer.ophis.fi/#faq",
          "isPartOf": { "@id": "https://explorer.ophis.fi/#webapp" },
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is Ophis?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Ophis is an intent-based DEX aggregator and a CoW Protocol fork, live on Optimism mainnet. Trades are gasless, off-chain, EIP-712-signed intents that solvers compete to fill, and they are settled on-chain and MEV-protected through CoW Protocol batch auctions. Ophis also reaches Solana and Bitcoin destinations via NEAR Intents across 11 EVM chains."
              }
            },
            {
              "@type": "Question",
              "name": "What does the Ophis Explorer show?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The explorer surfaces orders and their status, trades and the on-chain settlement transaction that filled them, per-address activity for any wallet, and solver competition: which solver won a batch and the price it returned."
              }
            },
            {
              "@type": "Question",
              "name": "What fees does Ophis charge?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Ophis charges a flat 0.10% (10 bps) fee on trade volume, applied to every trade. Same-chain stablecoin-to-stablecoin swaps pay a reduced 0.01% (1 bp). The fee is on volume only and takes no share of price improvement."
              }
            },
            {
              "@type": "Question",
              "name": "How are orders filled?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Each order is a signed intent with a hard limit price. Solvers compete in a batch auction to fill it, and the winning solver settles the trade on-chain at a uniform clearing price. Any surplus, meaning price improvement beyond the signed quote, is returned to the trader in full."
              }
            },
            {
              "@type": "Question",
              "name": "Who holds custody of funds on Ophis?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Ophis is non-custodial. Every order is signed by the user's own wallet, and funds never leave the user's control until the on-chain settlement executes the trade they signed."
              }
            }
          ]
        }
      ]
    }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
