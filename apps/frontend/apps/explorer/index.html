  <link rel="icon" type="image/png" href="/favicon-dark-mode.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="/favicon-light-mode.png" media="(prefers-color-scheme: no-preference)" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000" />
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Social media tags -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ophis Explorer" />
  <meta property="og:description" content="Ophis Explorer is a blockchain explorer for Ophis, the intent-based DEX aggregator." />

  <meta name="twitter:image" content="https://ophis.fi/og-image.png" />

  <!-- Structured data: static in the shell so crawlers see it without
       executing the SPA. application/ld+json is a data block, not subject to
       CSP script-src. -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://ophis.fi/#organization",
          "name": "Ophis",
          "url": "https://ophis.fi",
          "logo": "https://explorer.ophis.fi/android-chrome-512x512.png",
          "sameAs": ["https://github.com/ophis-fi/ophis", "https://x.com/ophisfi"]
        },
        {
          "@type": "WebApplication",
          "@id": "https://explorer.ophis.fi/#webapp",
          "name": "Ophis Explorer",
          "url": "https://explorer.ophis.fi/",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "description": "Blockchain explorer for Ophis, the intent-based DEX aggregator. Browse orders, trades, settlement batches, and solver competition across Ophis's supported chains (Optimism and Unichain self-hosted, plus Ethereum, Base, Arbitrum and more).",
          "isPartOf": { "@id": "https://ophis.fi/#organization" }
        }
      ]
    }
  </script>

</head>

<body>
  <!-- SEO/AEO fallback heading for crawlers that don't execute JS. Inside #root so
       React clears it on mount (createRoot empties the container); the route's own h1
       is the sole heading for JS clients + screen readers (no stale/duplicate). -->
  <div id="root"><h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">Ophis Explorer: intent-based DEX order and settlement explorer</h1></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
