packages:
  - 'apps/*'
  - 'libs/*'

# Enforce a 1-week delay (10080 minutes)
minimumReleaseAge: 10080

# Optional: Allow specific packages to update immediately
minimumReleaseAgeExclude:
  - react
  - next
  - typescript
  - '@types/*'
  - '@cowprotocol/*'
  # Security patches: bypass soak for CVE fixes
  - astro
  - '@astrojs/*'
  # form-data 2.5.6 is the GHSA-hmw2-7cc7-3qxx fix (v2 backport line, maintenance
  # only). Name-excluded so the security patch resolves despite the soak window;
  # the 2.5.x backport line is dormant so future-publish risk is negligible.
  - form-data
  # dompurify 3.4.9+ is the GHSA-vxr8-fq34-vvx9 cluster fix (XSS); name-excluded
  # so the security patch resolves despite the soak window.
  - dompurify
  # fast-uri 3.1.4 is the GHSA-4c8g-83qw-93j6 + GHSA-v2hh-gcrm-f6hx fix (host
  # confusion via IDN / backslash); name-excluded so the security patch resolves
  # despite the soak window (<1 week from release 2026-07-19).
  - fast-uri
  # protobufjs 7.6.3+ is the GHSA-f38q-mgvj-vph7 fix (prototype pollution);
  # name-excluded so the security patch resolves despite the soak window.
  - protobufjs
  # NOTE: esbuild 0.28.1 (GHSA-gv7w-rqvm-qjhr), http-proxy-middleware 3.0.7
  # (GHSA-gcq2-9pq2-cxqm; selective override on >=3.0.4 <3.0.7 so the v2 consumers
  # react-cosmos@7 + @nx/webpack are left untouched, since HPM v3 dropped the v2
  # createProxyMiddleware(context, options) API that react-cosmos' httpProxy plugin
  # uses; the dev-only v2 advisory GHSA-64mm-vxmg-q3vj is now fixed by the 2.0.10 v2
  # patch, pinned via the >=2.0.0 <2.0.10 override which keeps that v2 API), and
  # piscina 4.9.3 (GHSA-x9g3-xrwr-cwfg) are intentionally NOT name-excluded here. A package-name exclude would
  # permanently bypass the soak for EVERY future publish of those packages;
  # instead each fixed version is pinned in the committed lockfile, so
  # frozen-lockfile installs use it without re-resolving (a non-frozen re-resolve
  # will re-trip the soak, which is correct). To re-pin a newer fixed version,
  # temporarily add the package name above, install, then remove it again.
