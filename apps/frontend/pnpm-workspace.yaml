packages:
  - 'apps/*'
  - 'libs/*'

# Enforce a 1-week delay (10080 minutes)
minimumReleaseAge: 10080

# Optional: Allow specific packages to update immediately
minimumReleaseAgeExclude:
  - react
  - next
  - typescript
  - '@types/*'
  - '@cowprotocol/*'
  # Security patches: bypass soak for CVE fixes
  - astro
  - '@astrojs/*'
  # form-data 2.5.6 is the GHSA-hmw2-7cc7-3qxx fix (v2 backport line, maintenance
  # only). Name-excluded so the security patch resolves despite the soak window;
  # the 2.5.x backport line is dormant so future-publish risk is negligible.
  - form-data
  # dompurify 3.4.9+ is the GHSA-vxr8-fq34-vvx9 cluster fix (XSS); name-excluded
  # so the security patch resolves despite the soak window.
  - dompurify
  # protobufjs 7.6.3+ is the GHSA-f38q-mgvj-vph7 fix (prototype pollution);
  # name-excluded so the security patch resolves despite the soak window.
  - protobufjs
  # http-proxy-middleware 3.0.7 is the GHSA-gcq2-9pq2-cxqm fix and piscina 4.9.3
  # is the GHSA-x9g3-xrwr-cwfg fix (both build-time devDeps via @nx/react and
  # @swc/cli); name-excluded so the security patches resolve despite the soak.
  - http-proxy-middleware
  - piscina
  # NOTE: esbuild 0.28.1 (the GHSA-gv7w-rqvm-qjhr fix) is intentionally NOT
  # excluded here. A package-name exclude would permanently bypass the soak for
  # every future esbuild publish; instead 0.28.1 is already pinned in the
  # committed lockfile, so frozen-lockfile installs use it without re-resolving.
