# Boot:  docker compose --env-file .env up -d
# Tear:  docker compose down
# Logs:  docker compose logs -f indexer

services:
  pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rebates}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rebates}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-rebates}"]
      interval: 10s
      timeout: 3s
      retries: 5

  indexer:
    build:
      context: ../..
      dockerfile: apps/rebate-indexer/Dockerfile
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rebates}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB:-rebates}
      COW_API_BASE: ${COW_API_BASE:-https://api.cow.fi}
      GNOSIS_RPC_URL: ${GNOSIS_RPC_URL}
      SAFE_PROPOSER_PRIVATE_KEY: ${SAFE_PROPOSER_PRIVATE_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      API_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BATCHER_PROPOSE_ENABLED: ${BATCHER_PROPOSE_ENABLED:-true}
      REBATE_INDEXER_ADMIN_TOKEN: ${REBATE_INDEXER_ADMIN_TOKEN}
      # Money-path mode flags (audit 2026-06-09): without these pass-throughs a
      # .env flip silently no-ops — the container never saw the variables at all.
      # Defaults preserve live behavior (POOL mode, no conversion, no basis seed).
      REBATE_DIRECT_MODE: ${REBATE_DIRECT_MODE:-false}
      REBATE_CONVERT_ENABLED: ${REBATE_CONVERT_ENABLED:-false}
      REBATE_FEE_BASIS_WEI: ${REBATE_FEE_BASIS_WEI:-}
      REBATE_MAX_TRADE_USD: ${REBATE_MAX_TRADE_USD:-}
      # Optimism (sovereign Ophis backend) indexing. Defaults are production-ready;
      # set OPTIMISM_RPC_URL to a private OP RPC to avoid public-node rate limits
      # (the pricer reads ERC20 decimals on-chain to correct the OP native_price oracle).
      OP_ORDERBOOK_URL: ${OP_ORDERBOOK_URL:-https://optimism-mainnet.ophis.fi}
      OPTIMISM_RPC_URL: ${OPTIMISM_RPC_URL:-https://mainnet.optimism.io}
      # HyperEVM (chain 999) — self-hosted Ophis backend. Orderbook + on-chain
      # ERC20 decimals reads for the native_price 18-dec correction (same quirk as OP).
      # Set HYPEREVM_RPC_URL to a private RPC to avoid public-node rate limits.
      HYPEREVM_ORDERBOOK_URL: ${HYPEREVM_ORDERBOOK_URL:-https://hyperevm.ophis.fi}
      HYPEREVM_RPC_URL: ${HYPEREVM_RPC_URL:-https://rpc.hyperliquid.xyz/evm}
      # Canonical Plasma archive RPC, staged for the future Plasma self-host. The
      # indexer prices Plasma via CoW's native_price oracle today (same as all
      # hosted chains), so this is unused at runtime — but per the audit note
      # above, an env var only reaches the container if it's in this block, so the
      # passthrough is required for the .env value to ever take effect.
      PLASMA_RPC_URL: ${PLASMA_RPC_URL:-}
      # Affiliate payout proposal gate (default OFF — the deploy is inert until
      # flipped; the monthly report still shows affiliate owed regardless).
      AFFILIATE_PAYOUT_ENABLED: ${AFFILIATE_PAYOUT_ENABLED:-false}
    ports:
      # Bind to loopback only. Caddy reaches the indexer over the compose network
      # (reverse_proxy indexer:8080) and the deploy health-check curls
      # localhost:8080 on the host, so loopback is sufficient. Publishing on
      # 0.0.0.0 let an off-host caller hit :8080 directly, bypassing Caddy: with
      # Docker's bridge masquerade the source presented as the trusted gateway IP
      # (172.17.0.1), so Fastify trusted a spoofable X-Forwarded-For and the
      # per-IP rate limiter could be evaded or poisoned. Loopback closes that path.
      - "127.0.0.1:8080:8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [indexer]
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  caddy_data:
  caddy_config:
