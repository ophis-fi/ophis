# cargo-audit configuration
# Excludes known vulnerabilities from issue #3338 that require non-trivial upgrades
# Only NEW vulnerabilities will cause CI to fail

[advisories]
# Known vulnerabilities that are tracked in https://github.com/cowprotocol/services/issues/3338
ignore = [
  # rsa - Marvin Attack timing sidechannel (RUSTSEC-2023-0071)
  # No patch available yet (cryptography vulnerability)
  "RUSTSEC-2023-0071",

  # derivative - Unmaintained (RUSTSEC-2024-0388)
  # Evaluate alternatives (tracked in #3338)
  "RUSTSEC-2024-0388",

  # instant - Unmaintained (RUSTSEC-2024-0384)
  # Use web-time instead (tracked in #3338)
  "RUSTSEC-2024-0384",

  # paste - Unmaintained (RUSTSEC-2024-0436)
  # Archived upstream (tracked in #3338)
  "RUSTSEC-2024-0436",

  # model crate - data race in Shared (RUSTSEC-2020-0140)
  # Internal crate issue (tracked in #3338)
  "RUSTSEC-2020-0140",

  # rand - unsound interaction with a custom global logger (RUSTSEC-2026-0097)
  # Inapplicable to Ophis: we use the `tracing` crate, never replace the
  # `log` global logger. Re-evaluate if rand publishes a patched 0.9.x.
  "RUSTSEC-2026-0097",

  # proc-macro-error2 - Unmaintained (RUSTSEC-2026-0173)
  # Author-confirmed unmaintained build-time macro dep; no maintained drop-in
  # yet, not a vulnerability. Mirrors apps/backend/deny.toml, which already
  # ignores it (this file had drifted out of sync).
  "RUSTSEC-2026-0173",
]
