node-url = "http://localhost:8545"

[dex]
# Chain ID. This Odos SOR v2 solver is verified on Unichain (130). Odos encodes
# the chain in the request body (chainId), not the URL.
chain-id = "130"

# Optional: override the API endpoint (default https://api.odos.xyz/):
# endpoint = "https://api.odos.xyz/"

# Optional: Odos referral code for higher rate limits / partner attribution.
# KEYLESS — leave unset for anonymous (rate-limited) usage. It never touches the
# funds path. If you set it, render it from an env placeholder rather than
# hardcoding a value (it is a u64, so it is unquoted), e.g.:
# referral-code = ${ODOS_REFERRAL_CODE}

# NOTE: Odos's quote API is exactIn-only — buy (exactOut) orders are returned as
# "no solution". Odos exposes no min-out field, so the GUARANTEED slippage floor
# (out_amount * (10000 - clamped_bps) / 10000) is reported as the sell clearing
# amount, never the optimistic quote.
