[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]

# Compiler settings
via_ir = false
optimizer = true
optimizer_runs = 1000000
evm_version = "cancun"

# forge compiles the whole project (src + test), but two legacy CoW test
# fixtures import OpenZeppelin v3/v4 paths (drafts/presets/math) that the
# installed OZ v5 no longer ships. They are used ONLY by the Hardhat/TS e2e
# tests (which resolve a different OZ), never by the Foundry build, the Ophis
# contracts, or the fuzz suite — no .sol imports them. Skip them under forge so
# `forge build` / coverage / the Medusa+Echidna harness compile out of the box.
skip = [
  "*ERC20PresetPermit.sol",
  "*ChiToken.sol",
]

deny_warnings = true
# deny_warnings scope: recent solc (0.8.30+) added deprecation warnings
# (payable.transfer, virtual modifiers, memory-safe natspec, selfdestruct)
# that fire inside code we do not author: the VENDORED cowprotocol sources
# and their legacy tests (upstream-audited, kept byte-faithful), forge-std,
# and the GENERATED Echidna/Medusa harness under test/fizz (compiled by the
# fuzzers with their own solc settings). Ignore warnings FROM those paths
# only - Ophis-authored contracts (src/contracts/*.sol, src/contracts/vault,
# test/vault) remain fully warning-gated.
ignored_warnings_from = [
  "test/fizz",
  "test/GPv2Signing",
  "src/contracts/libraries",
  "lib/forge-std",
]

fs_permissions = [
  { access = "read", path = "./balancer"},
  { access = "read", path = "./networks.json"},
  { access = "read", path = "./out"}
]

[fmt]
sort_imports = true
ignore = [
  # We don't want to change the formatting of our main contracts until the
  # migration to Foundry is concluded.
  "src/contracts/**/*"
]

[profile.ci]
fuzz.seed = '0'

[lint]
# forge 1.5's build-time linter aborts the build on style lints (mixed-case,
# unaliased imports, unwrapped-modifier-logic, etc.) that originate almost
# entirely in the VENDORED CoW sources — blocking `forge build`/coverage/fuzz.
# Keep it off the build; run `forge lint` explicitly (e.g. in CI) to review
# Ophis-authored code. deny_warnings above still gates solc warnings.
lint_on_build = false
